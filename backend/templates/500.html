{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Something went wrong" %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
<div class="flex flex-col items-center justify-center min-h-screen px-4 text-center">
    <div class="text-6xl mb-4">500</div>
    <h1 class="text-xl font-semibold mb-2">{% trans "Something went wrong" %}</h1>
    <p class="text-gray-500 dark:text-gray-400 mb-6">
        {% trans "We're working on fixing this. Please try again in a moment." %}
    </p>
    <a href="/" class="px-4 py-2 bg-teal-600 text-white rounded-lg hover:bg-teal-700 transition-colors">
        {% trans "Go to Dashboard" %}
    </a>
</div>
</body>
</html>
