{% load money i18n %}
{% if values %}
<svg class="chart-sparkline" role="img" aria-label="{{ sparkline_label|default:_('Balance trend') }}" width="{{ width|default:120 }}" height="{{ height|default:40 }}" viewBox="0 0 100 40" preserveAspectRatio="none">
    <title>{{ sparkline_label|default:_("Balance trend") }}</title>
    <polygon class="sparkline-fill" points="0,40 {% sparkline_points values %} 100,40" fill="{{ color|default:'#0d9488' }}" />
    <polyline points="{% sparkline_points values %}" stroke="{{ color|default:'#0d9488' }}" />
</svg>
{% endif %}
