{% load i18n %}
{# Reusable feature hint component #}
{# Parameters: hint_id, hint_key, title, description, cta_text #}

<div id="{{ hint_id }}" class="hidden mb-4">
    <div class="bg-teal-50 dark:bg-teal-900/20 border border-teal-200 dark:border-teal-800 rounded-xl px-4 py-3 flex items-center justify-between gap-3" role="status">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-teal-100 dark:bg-teal-800/50 rounded-lg text-teal-600 dark:text-teal-400">
                {% if svg_icon %}
                    {{ svg_icon|safe }}
                {% else %}
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                {% endif %}
            </div>
            <div>
                <h4 class="text-sm font-bold text-teal-900 dark:text-teal-100">{{ title }}</h4>
                <p class="text-xs text-teal-800 dark:text-teal-200">
                    {{ description }}
                </p>
                {% if cta_text %}
                <button type="button" class="mt-2 text-xs font-bold text-teal-700 dark:text-teal-300 hover:underline hint-dismiss-btn">
                    {{ cta_text }}
                </button>
                {% endif %}
            </div>
        </div>
        <button type="button" class="text-teal-400 hover:text-teal-600 dark:text-teal-500 dark:hover:text-teal-300 flex-shrink-0 text-xl leading-none hint-dismiss-btn" aria-label="{% trans "Dismiss" %}">&times;</button>
    </div>
</div>

<script>
(function() {
    const hint = document.getElementById('{{ hint_id }}');
    const key = 'hint_dismissed_{{ hint_key }}';
    if (hint && !localStorage.getItem(key)) {
        hint.classList.remove('hidden');
        hint.querySelectorAll('.hint-dismiss-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                hint.classList.add('hidden');
                localStorage.setItem(key, '1');
            });
        });
    }
})();
</script>
