{% load i18n %}
{% if transactions %}
<div class="space-y-2">
    {% for tx in transactions %}
    {% include "transactions/_transaction_row.html" with tx=tx hide_kebab=True compact=True %}
    {% endfor %}
</div>
{% else %}
<div class="text-center py-4">
    <svg class="w-10 h-10 mx-auto text-gray-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 14l6-6m-5.5.5h.01m4.99 5h.01M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16l3.5-2 3.5 2 3.5-2 3.5 2z"/>
    </svg>
    <p class="text-sm text-gray-400">{% trans "No transactions yet." %}</p>
    <p class="text-xs text-gray-400 mt-1">{% trans "Tap + to record your first transaction." %}</p>
</div>
{% endif %}
