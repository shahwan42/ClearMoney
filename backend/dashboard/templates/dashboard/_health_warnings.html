{% if data.health_warnings %}
<section class="space-y-2">
    {% for warning in data.health_warnings %}
    <a href="/accounts/{{ warning.account_id }}" class="block bg-red-50 dark:bg-red-950/30 border border-red-200 dark:border-red-800 rounded-xl p-3">
        <p class="text-sm font-medium text-red-700 dark:text-red-400">{{ warning.message }}</p>
    </a>
    {% endfor %}
</section>
{% endif %}
