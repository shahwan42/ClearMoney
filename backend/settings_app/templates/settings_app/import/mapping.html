{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Map Columns" %} - ClearMoney{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-8">
    <h1 class="text-2xl font-bold mb-6">{% trans "Map CSV Columns" %}</h1>
    
    <div class="bg-surface rounded-xl border border-divider p-6">
        <form method="POST" action="{% url 'import-mapping' import_id %}">
            {% csrf_token %}

            <div class="mb-6">
                <label class="block text-sm font-medium text-text-secondary mb-2">{% trans "Target Account" %} *</label>
                <select name="account_id" required class="w-full px-3 py-2 bg-surface border border-divider rounded-lg focus:outline-none focus:border-brand text-sm">
                    <option value="">{% trans "-- Select Account --" %}</option>
                    {% for account in accounts %}
                    <option value="{{ account.id }}">{{ account.name }} ({{ account.currency }})</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">{% trans "Date Column" %} *</label>
                    <select name="col_date" required class="w-full px-3 py-2 bg-surface border border-divider rounded-lg focus:outline-none focus:border-brand text-sm">
                        <option value="">-- {% trans "Select Column" %} --</option>
                        {% for header in headers %}
                        <option value="{{ header }}" {% if 'date' in header|lower %}selected{% endif %}>{{ header }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">{% trans "Amount Column" %} *</label>
                    <select name="col_amount" required class="w-full px-3 py-2 bg-surface border border-divider rounded-lg focus:outline-none focus:border-brand text-sm">
                        <option value="">-- {% trans "Select Column" %} --</option>
                        {% for header in headers %}
                        <option value="{{ header }}" {% if 'amount' in header|lower %}selected{% endif %}>{{ header }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">{% trans "Type Column (Optional)" %}</label>
                    <select name="col_type" class="w-full px-3 py-2 bg-surface border border-divider rounded-lg focus:outline-none focus:border-brand text-sm">
                        <option value="">-- {% trans "Select Column" %} --</option>
                        {% for header in headers %}
                        <option value="{{ header }}" {% if 'type' in header|lower %}selected{% endif %}>{{ header }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-xs text-text-tertiary mt-1">{% trans "If empty, positive amounts are Income and negative are Expense." %}</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-text-secondary mb-2">{% trans "Note/Description Column (Optional)" %}</label>
                    <select name="col_note" class="w-full px-3 py-2 bg-surface border border-divider rounded-lg focus:outline-none focus:border-brand text-sm">
                        <option value="">-- {% trans "Select Column" %} --</option>
                        {% for header in headers %}
                        <option value="{{ header }}" {% if 'note' in header|lower or 'description' in header|lower %}selected{% endif %}>{{ header }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="flex justify-between items-center text-sm">
                <a href="{% url 'import-upload' %}" class="px-4 py-2 rounded-lg font-medium text-text-secondary hover:bg-surface-hover transition-colors">
                    {% trans "Back" %}
                </a>
                <button type="submit" class="px-4 py-2 rounded-lg font-medium bg-brand text-white hover:bg-brand-hover transition-colors shadow-sm">
                    {% trans "Preview" %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
