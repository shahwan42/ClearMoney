{% load money %}
{% load i18n %}

<h3 class="text-center font-semibold text-slate-800 dark:text-slate-200 text-sm mb-2">{% trans "Edit Total Budget" %}</h3>
<form
    hx-post="{% url 'total-budget-set' %}"
    hx-target="#edit-total-budget-result"
    hx-swap="innerHTML"
    class="space-y-4"
>
    {% csrf_token %}
    <div id="edit-total-budget-result" aria-live="polite"></div>
    <input type="hidden" name="currency" value="{{ total_budget.currency }}">
    <input type="hidden" name="form_source" value="edit-total-budget">

    <div class="rounded-lg bg-gray-50 dark:bg-slate-800/60 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-slate-400">{% trans "Currency" %}</p>
        <p class="text-sm font-semibold text-slate-800 dark:text-slate-100">{{ total_budget.currency }}</p>
    </div>

    <div>
        <label for="edit-total-budget-monthly-limit" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Monthly Limit" %}</label>
        <input type="number" name="monthly_limit" id="edit-total-budget-monthly-limit"
               step="0.01" min="0.01" required
               value="{{ total_budget.monthly_limit|floatformat:'2' }}"
               data-validate="required,min:0.01"
               class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <div class="flex gap-2 pt-1">
        <button type="submit"
                class="flex-1 bg-teal-600 text-white py-2.5 min-h-[44px] rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center">
            {% trans "Update" %}
        </button>
        <button type="button"
                onclick="closeEditBudgetSheet()"
                class="px-4 py-2.5 min-h-[44px] text-sm text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center justify-center">
            {% trans "Cancel" %}
        </button>
    </div>
</form>
