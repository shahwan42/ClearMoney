{% load money %}
{% load i18n %}

<h3 class="text-center font-semibold text-slate-800 dark:text-slate-200 text-sm mb-2">{% trans "Edit Budget" %}</h3>
<form
    hx-post="{% url 'budget-edit' budget.id %}"
    hx-target="#edit-budget-result"
    hx-swap="innerHTML"
    class="space-y-4"
>
    {% csrf_token %}
    <div id="edit-budget-result" aria-live="polite"></div>

    <div class="rounded-lg bg-gray-50 dark:bg-slate-800/60 px-3 py-2">
        <p class="text-xs text-gray-500 dark:text-slate-400">{% trans "Category" %}</p>
        <p class="text-sm font-semibold text-slate-800 dark:text-slate-100">
            {% if budget.category_icon %}{{ budget.category_icon }} {% endif %}{{ budget.category_name }} - {{ budget.currency }}
        </p>
    </div>

    <div>
        <label for="edit-budget-monthly-limit" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Monthly Limit" %}</label>
        <input type="number" name="monthly_limit" id="edit-budget-monthly-limit"
               step="0.01" min="0.01" required
               value="{{ budget.monthly_limit|floatformat:'2' }}"
               data-validate="required,min:0.01"
               class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <label class="flex items-center gap-3 cursor-pointer py-1">
        <input type="checkbox" name="rollover_enabled"
               class="w-5 h-5 text-teal-600 border-gray-300 rounded focus:ring-teal-500"
               {% if budget.rollover_enabled %}checked{% endif %}>
        <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{% trans "Enable rollover" %}</span>
    </label>

    <div>
        <label for="edit-budget-max-rollover" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Max carryover" %} <span class="text-gray-400">{% trans "(optional)" %}</span></label>
        <input type="number" name="max_rollover" id="edit-budget-max-rollover"
               step="0.01" min="0" placeholder="0.00"
               {% if budget.max_rollover is not None %}value="{{ budget.max_rollover|floatformat:'2' }}"{% endif %}
               class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <div class="flex gap-2 pt-1">
        <button type="submit"
                class="flex-1 bg-teal-600 text-white py-2.5 min-h-[44px] rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center">
            {% trans "Update" %}
        </button>
        <button type="button"
                onclick="closeEditBudgetSheet()"
                class="px-4 py-2.5 min-h-[44px] text-sm text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center justify-center">
            {% trans "Cancel" %}
        </button>
    </div>
</form>
