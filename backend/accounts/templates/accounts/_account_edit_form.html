{% comment %}
Account edit form — rendered inside the edit-account bottom sheet.
Port of Go's partials/account-edit-form.html.
Context: account (dict with id, name, type, currency, is_credit_type, credit_limit).
{% endcomment %}
{% load money %}
<h3 class="text-center font-semibold text-slate-800 dark:text-slate-200 text-sm mb-2">Edit Account</h3>
<form
    hx-post="/accounts/{{ account.id }}/edit"
    hx-target="#edit-account-result"
    hx-swap="innerHTML"
    class="space-y-3"
>
    <div id="edit-account-result" aria-live="polite"></div>

    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Account Name</label>
        <input type="text" name="name" required maxlength="100" value="{{ account.name }}"
            class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Type</label>
            <select name="type" id="edit-account-type-select"
                onchange="document.getElementById('edit-credit-limit-field').style.display = (this.value === 'credit_card' || this.value === 'credit_limit') ? 'block' : 'none'"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="current" {% if account.type == "current" %}selected{% endif %}>Current</option>
                <option value="savings" {% if account.type == "savings" %}selected{% endif %}>Savings</option>
                <option value="prepaid" {% if account.type == "prepaid" %}selected{% endif %}>Prepaid</option>
                <option value="cash" {% if account.type == "cash" %}selected{% endif %}>Cash</option>
                <option value="credit_card" {% if account.type == "credit_card" %}selected{% endif %}>Credit Card</option>
                <option value="credit_limit" {% if account.type == "credit_limit" %}selected{% endif %}>Credit Limit</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Currency</label>
            <select name="currency"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="EGP" {% if account.currency == "EGP" %}selected{% endif %}>EGP</option>
                <option value="USD" {% if account.currency == "USD" %}selected{% endif %}>USD</option>
            </select>
        </div>
    </div>

    <div id="edit-credit-limit-field" style="{% if account.is_credit_type %}display: block;{% else %}display: none;{% endif %}">
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Credit Limit</label>
        <input type="number" name="credit_limit" step="0.01" min="0" placeholder="e.g., 500000"
            {% if account.credit_limit %}value="{{ account.credit_limit|deref_float }}"{% endif %}
            class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <div class="flex gap-2 pt-1">
        <button type="submit"
            class="flex-1 bg-teal-600 text-white py-2.5 min-h-[44px] rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center">
            Update
        </button>
        <button type="button"
            onclick="closeEditAccount()"
            class="px-4 py-2.5 min-h-[44px] text-sm text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200 flex items-center justify-center">
            Cancel
        </button>
    </div>
</form>
