{% comment %}
Institution edit form — rendered inside the edit bottom sheet.
Port of Go's partials/institution-edit-form.html.
Context: institution (dict: id, name, type), error (optional string).
{% endcomment %}
<div class="space-y-3">
    {% if error %}
    <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm">{{ error }}</div>
    {% endif %}

    <form hx-put="/institutions/{{ institution.id }}/update"
          hx-target="#edit-sheet-content"
          hx-swap="innerHTML">

        <h3 class="font-semibold text-slate-800 text-sm mb-3">Edit Institution</h3>

        <div class="space-y-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Name</label>
                <input type="text" name="name" value="{{ institution.name }}" required
                    placeholder="e.g., HSBC, CIB, Telda"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>

            <div>
                <label class="block text-xs text-gray-500 mb-1">Type</label>
                <select name="type"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="bank" {% if institution.type == "bank" %}selected{% endif %}>Bank</option>
                    <option value="fintech" {% if institution.type == "fintech" %}selected{% endif %}>Fintech</option>
                    <option value="wallet" {% if institution.type == "wallet" %}selected{% endif %}>Wallet</option>
                </select>
            </div>
        </div>

        <div class="flex gap-2 mt-4">
            <button type="submit"
                class="flex-1 bg-teal-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all">
                Update
            </button>
            <button type="button" onclick="closeEditSheet()"
                class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg text-sm font-medium hover:bg-gray-200 dark:hover:bg-slate-600">
                Cancel
            </button>
        </div>
    </form>
</div>
