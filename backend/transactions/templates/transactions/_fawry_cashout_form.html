{% load money %}
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-5 space-y-4">
    <h3 class="text-base font-bold text-slate-800 dark:text-slate-100">Fawry Cash-Out</h3>
    <p class="text-xs text-gray-500">Charge your credit card and load funds to a Fawry prepaid account.</p>

    <form hx-post="/transactions/fawry-cashout" hx-target="#fawry-result" hx-swap="innerHTML" class="space-y-3">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Credit Card</label>
            <select name="credit_card_id" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
                <option value="">Select credit card...</option>
                {% for acc in accounts %}{% if acc.type == "credit_card" %}
                <option value="{{ acc.id }}">{{ acc.name }}</option>
                {% endif %}{% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Prepaid / Fawry Account</label>
            <select name="prepaid_account_id" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
                <option value="">Select prepaid account...</option>
                {% for acc in accounts %}{% if acc.type == "prepaid" %}
                <option value="{{ acc.id }}">{{ acc.name }}</option>
                {% endif %}{% endfor %}
            </select>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Amount (net, what you receive)</label>
            <input type="number" name="amount" step="0.01" min="0.01" required
                   placeholder="0.00" inputmode="decimal"
                   class="w-full text-xl font-bold text-center border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
                   oninput="updateFawryTotal()">
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Fee</label>
            <input type="number" name="fee" step="0.01" min="0" value="0"
                   id="fawry-fee" inputmode="decimal"
                   class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm"
                   oninput="updateFawryTotal()">
        </div>

        <div class="bg-amber-50 rounded-lg p-3 flex justify-between items-center">
            <span class="text-sm text-amber-700">Total charged to card</span>
            <span class="text-lg font-bold text-amber-700" id="fawry-total">EGP 0.00</span>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Currency</label>
            <select name="currency" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
                <option value="EGP" selected>EGP</option>
                <option value="USD">USD</option>
            </select>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Date</label>
            <input type="date" name="date" value="{{ today|date:'Y-m-d' }}" class="w-full min-w-0 max-w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Note (optional)</label>
            <input type="text" name="note" placeholder="e.g., Cash withdrawal"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
        </div>

        <button type="submit"
                class="w-full bg-teal-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-teal-700">
            Process Cash-Out
        </button>
    </form>

    <div id="fawry-result" aria-live="polite" aria-atomic="true"></div>
</div>

<script>
function updateFawryTotal() {
    var amount = parseFloat(document.querySelector('[name="amount"]').value) || 0;
    var fee = parseFloat(document.getElementById('fawry-fee').value) || 0;
    var total = amount + fee;
    document.getElementById('fawry-total').textContent = 'EGP ' + total.toFixed(2);
}
</script>
