{% load money %}
{% load i18n %}
<div class="bg-teal-50 border border-teal-200 dark:border-teal-800 rounded-xl p-5 text-center space-y-2 animate-fade-in">
    <div class="text-3xl">&#10003;</div>
    <p class="text-teal-800 dark:text-teal-300 font-semibold">{% trans "Transaction saved!" %}</p>
    <p class="text-sm text-teal-600">
        {% trans "New balance:" %} <span class="font-bold">{{ new_balance|format_currency:currency }}</span>
    </p>
    <div class="flex gap-2 mt-3 justify-center">
        <a href="/transactions/new"
            class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm font-medium hover:bg-teal-700">
            {% trans "Add Another" %}
        </a>
        <a href="/"
            class="px-4 py-2 bg-white dark:bg-slate-800 text-teal-600 border border-teal-200 dark:border-teal-800 rounded-lg text-sm font-medium hover:bg-teal-50 dark:hover:bg-teal-900/20">
            {% trans "Go to Dashboard" %}
        </a>
    </div>
</div>
