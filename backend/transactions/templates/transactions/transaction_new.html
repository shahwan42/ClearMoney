{% extends "base.html" %}
{% load money %}

{% block title %}ClearMoney - New Transaction{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-4">

    <h2 class="text-lg font-bold text-slate-800 mb-4">New Transaction</h2>

    <div id="transaction-result" aria-live="polite"></div>

    <form
        hx-post="/transactions"
        hx-target="#transaction-result"
        hx-swap="innerHTML"
        hx-disabled-elt="find button[type='submit']"
        class="bg-white rounded-2xl shadow-sm p-5 space-y-4"
    >
        <!-- Type selector -->
        <fieldset class="border-0 p-0 m-0">
            <legend class="sr-only">Transaction type</legend>
            <div class="flex gap-2">
                <label class="flex-1">
                    <input type="radio" name="type" value="expense" {% if not prefill or prefill.type == "expense" %}checked{% endif %} class="peer hidden">
                    <div class="peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-700 border-2 border-gray-200 rounded-xl py-3 text-center text-sm font-medium cursor-pointer transition-all"
                         id="type-expense-label">
                        Expense
                    </div>
                </label>
                <label class="flex-1">
                    <input type="radio" name="type" value="income" {% if prefill and prefill.type == "income" %}checked{% endif %} class="peer hidden">
                    <div class="peer-checked:bg-teal-50 peer-checked:border-teal-400 peer-checked:text-teal-700 border-2 border-gray-200 rounded-xl py-3 text-center text-sm font-medium cursor-pointer transition-all"
                         id="type-income-label">
                        Income
                    </div>
                </label>
            </div>
        </fieldset>

        <!-- Amount -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Amount</label>
            <input type="number" name="amount" step="0.01" min="0.01" required autofocus
                placeholder="0.00"
                {% if prefill %}value="{{ prefill.amount }}"{% endif %}
                class="w-full text-3xl font-bold text-center border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400"
                inputmode="decimal">
        </div>

        <!-- Account -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Account</label>
            <select name="account_id" required
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="">Select account...</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}" {% if prefill and prefill.account_id == acc.id %}selected{% endif %}>{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        <input type="hidden" name="currency" value="{% if prefill %}{{ prefill.currency }}{% else %}EGP{% endif %}" id="currency-input">

        <!-- Category -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" id="category-label">Category</label>
            <div data-category-combobox
                 data-categories='{{ categories|categories_json }}'
                 data-name="category_id"
                 data-selected-id="{% if prefill %}{{ prefill.category_id|default:'' }}{% endif %}"
                 data-placeholder="Search categories..."
                 data-allow-empty="true"
                 id="category-combobox">
            </div>
        </div>

        <!-- Note -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="note-input">Note (optional)</label>
            <input type="text" name="note" id="note-input" placeholder="What was this for?"
                {% if prefill and prefill.note %}value="{{ prefill.note }}"{% endif %}
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
        </div>

        <!-- Hidden date submitted when "More options" is collapsed -->
        <input type="hidden" name="date" id="date-default" value="{{ today|date:'Y-m-d' }}">

        <!-- More options toggle -->
        <button type="button" id="more-options-toggle"
            aria-expanded="false" aria-controls="more-options"
            class="text-sm text-teal-600 hover:text-teal-800 font-medium flex items-center gap-1 transition-colors min-h-[44px]">
            <svg id="more-options-chevron" class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
            More options<span id="more-options-date-hint" class="text-gray-400 font-normal"></span>
        </button>

        <!-- Optional fields: date, virtual account -->
        <div id="more-options" class="hidden space-y-4">

            <!-- Date -->
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="date-picker">Date</label>
                <input type="date" name="date" id="date-picker" disabled
                    value="{% if prefill and prefill.date %}{{ prefill.date|date:'Y-m-d' }}{% else %}{{ today|date:'Y-m-d' }}{% endif %}"
                    class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
            </div>

            <!-- Virtual account -->
            {% if virtual_accounts %}
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="va-select">Virtual Account (optional)</label>
                <select name="virtual_account_id" id="va-select"
                    class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                    <option value="">None</option>
                    {% for va in virtual_accounts %}
                    <option value="{{ va.id }}" data-account-id="{{ va.account_id|default:'' }}"
                        {% if prefill and prefill.virtual_account_id == va.id %}selected{% endif %}>{{ va.name }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

        </div>

        <button type="submit"
            class="w-full bg-teal-600 text-white py-3 min-h-[44px] rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center">
            <span class="btn-label">Save Transaction</span>
            <span class="btn-spinner hidden">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </span>
        </button>
    </form>

</div>

<script>
(function() {
    // --- More options toggle ---
    var toggle = document.getElementById('more-options-toggle');
    var panel = document.getElementById('more-options');
    var datePicker = document.getElementById('date-picker');
    var dateDefault = document.getElementById('date-default');
    var chevron = document.getElementById('more-options-chevron');
    var dateHint = document.getElementById('more-options-date-hint');
    var todayIso = '{{ today|date:"Y-m-d" }}';

    function updateDateHint() {
        if (!dateHint || !datePicker) return;
        var val = datePicker.value;
        dateHint.textContent = (val && val !== todayIso)
            ? ' · ' + new Date(val + 'T00:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
            : '';
    }

    function openMoreOptions() {
        panel.classList.remove('hidden');
        toggle.setAttribute('aria-expanded', 'true');
        if (chevron) chevron.style.transform = 'rotate(180deg)';
        if (datePicker) datePicker.disabled = false;
        if (dateDefault) dateDefault.disabled = true;
        if (dateHint) dateHint.textContent = '';
    }

    function closeMoreOptions() {
        panel.classList.add('hidden');
        toggle.setAttribute('aria-expanded', 'false');
        if (chevron) chevron.style.transform = '';
        if (datePicker) datePicker.disabled = true;
        if (dateDefault) dateDefault.disabled = false;
        updateDateHint();
    }

    if (toggle) {
        toggle.addEventListener('click', function() {
            if (toggle.getAttribute('aria-expanded') === 'true') {
                closeMoreOptions();
            } else {
                openMoreOptions();
            }
        });
    }

    var acctSelect = document.querySelector('select[name="account_id"]');
    if (acctSelect) {
        acctSelect.addEventListener('change', function() {
            var selected = this.options[this.selectedIndex];
            if (selected && selected.text.includes('USD')) {
                document.getElementById('currency-input').value = 'USD';
            } else {
                document.getElementById('currency-input').value = 'EGP';
            }
            filterVirtualAccounts();
        });
    }

    function filterVirtualAccounts() {
        var vaSelect = document.getElementById('va-select');
        if (!acctSelect || !vaSelect) return;
        var selectedAcct = acctSelect.value;
        vaSelect.querySelectorAll('option').forEach(function(opt) {
            if (!opt.value) return;
            var vaAcctId = opt.getAttribute('data-account-id');
            var hide = vaAcctId && vaAcctId !== selectedAcct;
            opt.hidden = hide;
            opt.disabled = hide;
        });
        if (vaSelect.selectedOptions[0] && vaSelect.selectedOptions[0].hidden) {
            vaSelect.value = '';
        }
    }
    filterVirtualAccounts();

    // --- Auto-reset form after successful HTMX submit ---
    var txForm = document.querySelector('form[hx-post="/transactions"]');
    if (txForm) {
        txForm.addEventListener('htmx:afterRequest', function(evt) {
            if (evt.detail.successful) {
                txForm.reset();
                // Reset category combobox (custom component)
                var catEl = document.getElementById('category-combobox');
                if (catEl && catEl._combobox) catEl._combobox.selectById('');
                // Reset currency hidden field to EGP default
                var currInput = document.getElementById('currency-input');
                if (currInput) currInput.value = 'EGP';
                // Re-close more-options panel
                closeMoreOptions();
            }
        });
    }
})();
</script>
{% endblock %}
