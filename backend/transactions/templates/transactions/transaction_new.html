{% extends "base.html" %}
{% load money %}
{% load i18n %}

{% block title %}{% trans "ClearMoney - New Transaction" %}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-4">

    <h2 class="text-lg font-bold text-slate-800 dark:text-white px-2 mb-4">{% trans "New Transaction" %}</h2>

    <form method="POST" action="{% url 'transactions' %}" id="tx-form" enctype="multipart/form-data" class="space-y-4 px-2">
        {% csrf_token %}

        <div class="grid grid-cols-2 gap-3">
            <!-- Type -->
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="type-select">{% trans "Type" %}</label>
                <select name="type" id="type-select" required 
                        class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                    <option value="expense" {% if prefill and prefill.type == "expense" %}selected{% endif %}>{% trans "Expense" %}</option>
                    <option value="income" {% if prefill and prefill.type == "income" %}selected{% endif %}>{% trans "Income" %}</option>
                </select>
            </div>

            <!-- Amount -->
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="amount-input">{% trans "Amount" %}</label>
                <input type="number" name="amount" id="amount-input" step="0.01" required placeholder="0.00"
                    {% if prefill and prefill.amount %}value="{{ prefill.amount }}"{% endif %}
                    class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
            </div>
        </div>

        <!-- Account -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="account-select">{% trans "Account" %}</label>
            <select name="account_id" id="account-select" required
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="">{% trans "Select account..." %}</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}" {% if prefill and prefill.account_id == acc.id|stringformat:"s" %}selected{% endif %}>{{ acc.name }} ({{ acc.current_balance|format_currency:acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        <!-- Category -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Category" %}</label>
            <div data-category-combobox
                 data-categories='{{ categories|categories_json }}'
                 data-name="category_id"
                 {% if prefill and prefill.category_id %}data-selected-id="{{ prefill.category_id }}"{% endif %}
                 data-placeholder="{% trans "Select category..." %}"
                 data-allow-empty="true">
            </div>
        </div>

        <!-- Note -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="note-input">{% trans "Note (optional)" %}</label>
            <input type="text" name="note" id="note-input" maxlength="500" placeholder="{% trans "What was this for?" %}"
                {% if prefill and prefill.note %}value="{{ prefill.note }}"{% endif %}
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
        </div>

        <!-- Tags -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="tags-input">{% trans "Tags (comma-separated)" %}</label>
            <input type="text" name="tags" id="tags-input" placeholder="{% trans "vacation, wedding..." %}"
                {% if prefill and prefill.tags %}value="{{ prefill.tags|join:', ' }}"{% endif %}
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
        </div>

        <!-- Attachment -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="attachment-input">{% trans "Receipt / Attachment" %}</label>
            <input type="file" name="attachment" id="attachment-input" accept="image/*,application/pdf"
                class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-teal-50 file:text-teal-700 hover:file:bg-teal-100">
        </div>

        <!-- More options section -->
        <div id="more-options" class="hidden space-y-4 pt-2 border-t border-gray-100 dark:border-slate-700">
            <!-- Date -->
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="date-input">{% trans "Date" %}</label>
                <input type="date" name="date" id="date-input" value="{{ today|date:'Y-m-d' }}"
                    class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
            </div>

            <!-- Fee -->
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="fee-input">{% trans "Fee (optional)" %}</label>
                <input type="number" name="fee_amount" id="fee-input" step="0.01" placeholder="0.00"
                    class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
            </div>

            <!-- Link to Goal -->
            <div>
                <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="va-select">{% trans "Link to Goal" %}</label>
                <select name="virtual_account_id" id="va-select"
                    class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                    <option value="">{% trans "No goal" %}</option>
                    {% for va in virtual_accounts %}
                    <option value="{{ va.id }}">{{ va.name }} ({{ va.current_balance|format_egp }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Hidden inputs for fallback values when "More options" is collapsed -->
        <input type="hidden" name="date" id="date-default" value="{{ today|date:'Y-m-d' }}">

        <!-- More options toggle -->
        <button type="button" id="more-options-toggle"
                class="flex items-center gap-1 text-xs font-semibold text-gray-500 hover:text-teal-600 transition-colors py-1">
            <svg id="options-chevron" class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
            <span id="options-text">{% trans "More options" %}</span>
        </button>

        <!-- Submit -->
        <div class="pt-4">
            <button type="submit" 
                    class="w-full bg-teal-600 text-white rounded-xl py-3.5 text-base font-bold shadow-lg hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                {% trans "Save Transaction" %}
            </button>
            <a href="{% url 'transactions' %}" 
               class="block text-center text-gray-500 py-3 text-sm font-medium">{% trans "Cancel" %}</a>
        </div>
    </form>
</div>

<script>
(function() {
    const toggle = document.getElementById('more-options-toggle');
    const moreOptions = document.getElementById('more-options');
    const chevron = document.getElementById('options-chevron');
    const dateDefault = document.getElementById('date-default');
    const dateInput = document.getElementById('date-input');
    const txForm = document.getElementById('tx-form');

    toggle.addEventListener('click', function() {
        const isHidden = moreOptions.classList.contains('hidden');
        moreOptions.classList.toggle('hidden');
        chevron.style.transform = isHidden ? 'rotate(180deg)' : 'rotate(0deg)';
        
        // Sync date inputs if hidden
        if (!isHidden) {
            dateDefault.value = dateInput.value;
        }
    });

    // Simple draft save to local storage
    const DRAFT_KEY = 'tx_form_draft';
    function saveDraft() {
        const data = new FormData(txForm);
        const obj = {};
        data.forEach((value, key) => {
            if (!(value instanceof File)) obj[key] = value;
        });
        localStorage.setItem(DRAFT_KEY, JSON.stringify(obj));
    }

    function restoreDraft() {
        const draft = localStorage.getItem(DRAFT_KEY);
        if (!draft) return;
        const obj = JSON.parse(draft);
        Object.keys(obj).forEach(key => {
            const el = txForm.querySelector(`[name="${key}"]`);
            if (el && el.type !== 'file') el.value = obj[key];
        });
    }

    if (txForm) {
        ['input', 'change'].forEach(function(event) {
            txForm.addEventListener(event, saveDraft, true);
        });
    }

    // Restore draft on page load
    restoreDraft();
})();
</script>
{% endblock %}
