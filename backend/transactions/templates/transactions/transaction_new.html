{% extends "base.html" %}
{% load money %}

{% block title %}ClearMoney - New Transaction{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-4">

    <h2 class="text-lg font-bold text-slate-800 mb-4">New Transaction</h2>

    <div id="transaction-result" aria-live="polite"></div>

    <form
        hx-post="/transactions"
        hx-target="#transaction-result"
        hx-swap="innerHTML"
        class="bg-white rounded-2xl shadow-sm p-5 space-y-4"
    >
        <!-- Type selector -->
        <fieldset class="border-0 p-0 m-0">
            <legend class="sr-only">Transaction type</legend>
            <div class="flex gap-2">
                <label class="flex-1">
                    <input type="radio" name="type" value="expense" {% if not prefill or prefill.type == "expense" %}checked{% endif %} class="peer hidden">
                    <div class="peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-700 border-2 border-gray-200 rounded-xl py-3 text-center text-sm font-medium cursor-pointer transition-all"
                         id="type-expense-label">
                        Expense
                    </div>
                </label>
                <label class="flex-1">
                    <input type="radio" name="type" value="income" {% if prefill and prefill.type == "income" %}checked{% endif %} class="peer hidden">
                    <div class="peer-checked:bg-teal-50 peer-checked:border-teal-400 peer-checked:text-teal-700 border-2 border-gray-200 rounded-xl py-3 text-center text-sm font-medium cursor-pointer transition-all"
                         id="type-income-label">
                        Income
                    </div>
                </label>
            </div>
        </fieldset>

        <!-- Amount -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Amount</label>
            <input type="number" name="amount" step="0.01" min="0.01" required autofocus
                placeholder="0.00"
                {% if prefill %}value="{{ prefill.amount }}"{% endif %}
                class="w-full text-3xl font-bold text-center border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500"
                inputmode="decimal">
        </div>

        <!-- Account -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Account</label>
            <select name="account_id" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="">Select account...</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}" {% if prefill and prefill.account_id == acc.id %}selected{% endif %}>{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        <input type="hidden" name="currency" value="{% if prefill %}{{ prefill.currency }}{% else %}EGP{% endif %}" id="currency-input">

        <!-- Category -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Category</label>
            <select name="category_id"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                id="category-select">
                <option value="">None</option>
                <optgroup label="Expense" class="category-expense">
                {% for cat in expense_categories %}
                <option value="{{ cat.id }}" {% if prefill and prefill.category_id == cat.id %}selected{% endif %}>{% if cat.icon %}{{ cat.icon }} {% endif %}{{ cat.name }}</option>
                {% endfor %}
                </optgroup>
                <optgroup label="Income" class="category-income" style="display:none">
                {% for cat in income_categories %}
                <option value="{{ cat.id }}" {% if prefill and prefill.category_id == cat.id %}selected{% endif %}>{% if cat.icon %}{{ cat.icon }} {% endif %}{{ cat.name }}</option>
                {% endfor %}
                </optgroup>
            </select>
        </div>

        <!-- Date -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Date</label>
            <input type="date" name="date" value="{{ today|date:'Y-m-d' }}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <!-- Note -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Note (optional)</label>
            <input type="text" name="note" placeholder="What was this for?"
                {% if prefill and prefill.note %}value="{{ prefill.note }}"{% endif %}
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <!-- Virtual account -->
        {% if virtual_accounts %}
        <div>
            <label class="block text-xs text-gray-500 mb-1">Virtual Account (optional)</label>
            <select name="virtual_account_id" id="va-select"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="">None</option>
                {% for va in virtual_accounts %}
                <option value="{{ va.id }}" data-account-id="{{ va.account_id|default:'' }}">{{ va.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <button type="submit"
            class="w-full bg-teal-600 text-white py-3 rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all">
            Save Transaction
        </button>
    </form>

</div>

<script>
(function() {
    var dateInput = document.querySelector('input[name="date"]');
    if (dateInput && !dateInput.value) {
        dateInput.value = new Date().toISOString().split('T')[0];
    }

    function toggleCategories(isExpense) {
        var expGrp = document.querySelector('optgroup.category-expense');
        var incGrp = document.querySelector('optgroup.category-income');
        expGrp.style.display = isExpense ? '' : 'none';
        incGrp.style.display = isExpense ? 'none' : '';
        expGrp.querySelectorAll('option').forEach(function(o) { o.disabled = !isExpense; o.hidden = !isExpense; });
        incGrp.querySelectorAll('option').forEach(function(o) { o.disabled = isExpense; o.hidden = isExpense; });
        document.getElementById('category-select').value = '';
    }
    document.querySelectorAll('input[name="type"]').forEach(function(radio) {
        radio.addEventListener('change', function() { toggleCategories(this.value === 'expense'); });
    });

    var checkedType = document.querySelector('input[name="type"]:checked');
    if (checkedType && checkedType.value === 'income') {
        toggleCategories(false);
    }

    var acctSelect = document.querySelector('select[name="account_id"]');
    if (acctSelect) {
        acctSelect.addEventListener('change', function() {
            var selected = this.options[this.selectedIndex];
            if (selected && selected.text.includes('USD')) {
                document.getElementById('currency-input').value = 'USD';
            } else {
                document.getElementById('currency-input').value = 'EGP';
            }
            filterVirtualAccounts();
        });
    }

    function filterVirtualAccounts() {
        var vaSelect = document.getElementById('va-select');
        if (!acctSelect || !vaSelect) return;
        var selectedAcct = acctSelect.value;
        vaSelect.querySelectorAll('option').forEach(function(opt) {
            if (!opt.value) return;
            var vaAcctId = opt.getAttribute('data-account-id');
            var hide = vaAcctId && vaAcctId !== selectedAcct;
            opt.hidden = hide;
            opt.disabled = hide;
        });
        if (vaSelect.selectedOptions[0] && vaSelect.selectedOptions[0].hidden) {
            vaSelect.value = '';
        }
    }
    filterVirtualAccounts();
})();
</script>
{% endblock %}
