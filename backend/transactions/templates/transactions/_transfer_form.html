{% load money %}
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm p-5 space-y-4">
    <h2 class="text-base font-bold text-slate-800 dark:text-white">Transfer Between Accounts</h2>
    <form hx-post="/transactions/transfer" hx-target="#transfer-result" hx-swap="innerHTML"
          hx-disabled-elt="find button[type='submit']"
          class="space-y-3" id="transfer-form">
        <div>
            <label for="source_account_id" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">From Account</label>
            <select name="source_account_id" id="source_account_id" required
                    class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
                <option value="">Select source...</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}">{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="dest_account_id" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">To Account</label>
            <select name="dest_account_id" id="dest_account_id" required
                    class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
                <option value="">Select destination...</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}">{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="transfer-amount" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Amount</label>
            <input type="number" name="amount" id="transfer-amount" step="0.01" min="0.01" required
                   class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm"
                   oninput="updateTransferTotal()">
        </div>

        <div>
            <label for="transfer-fee" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Fee (optional)</label>
            <input type="number" name="fee_amount" id="transfer-fee" step="0.01" min="0" placeholder="0.00"
                   class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm"
                   oninput="updateTransferTotal()">
        </div>

        <div id="transfer-total-display" class="hidden bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg p-2 text-xs text-slate-600 dark:text-slate-300">
            Total from source: <span data-transfer-total class="font-semibold">0.00</span>
        </div>

        <div>
            <label for="transfer-note" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Note (optional)</label>
            <input type="text" name="note" id="transfer-note"
                   class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
        </div>

        <div>
            <label for="transfer-date" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Date</label>
            <input type="date" name="date" id="transfer-date" value="{{ today|date:'Y-m-d' }}"
                   class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
        </div>

        <button type="submit"
                class="relative w-full bg-teal-600 text-white py-3 min-h-[44px] rounded-xl text-sm font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center overflow-hidden">
            <span class="btn-label">Transfer</span>
            <span class="btn-spinner hidden">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </span>
        </button>
    </form>
    <div id="transfer-result" aria-live="polite"></div>
</div>

<script>
function updateTransferTotal() {
    var amount = parseFloat(document.getElementById('transfer-amount').value) || 0;
    var fee = parseFloat(document.getElementById('transfer-fee').value) || 0;
    var total = amount + fee;
    var display = document.getElementById('transfer-total-display');
    var totalSpan = document.querySelector('[data-transfer-total]');
    if (fee > 0) {
        display.classList.remove('hidden');
        totalSpan.textContent = total.toFixed(2);
    } else {
        display.classList.add('hidden');
    }
}
</script>
