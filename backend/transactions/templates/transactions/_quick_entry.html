{% load money %}
<h3 class="text-lg font-bold text-slate-800 mb-4">Quick Entry</h3>

<div id="quick-entry-result" aria-live="polite"></div>

<form
    hx-post="/transactions/quick"
    hx-target="#quick-entry-result"
    hx-swap="innerHTML"
    hx-disabled-elt="find button[type='submit']"
    class="space-y-4"
    id="quick-entry-form"
>
    <fieldset class="border-0 p-0 m-0">
        <legend class="sr-only">Transaction type</legend>
        <div class="flex gap-2">
            <label class="flex-1">
                <input type="radio" name="type" value="expense" checked class="peer hidden">
                <div class="peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-700 border-2 border-gray-200 rounded-xl py-3 min-h-[44px] text-center text-sm font-medium cursor-pointer transition-all flex items-center justify-center">
                    Expense
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="type" value="income" class="peer hidden">
                <div class="peer-checked:bg-teal-50 peer-checked:border-teal-400 peer-checked:text-teal-700 border-2 border-gray-200 rounded-xl py-3 min-h-[44px] text-center text-sm font-medium cursor-pointer transition-all flex items-center justify-center">
                    Income
                </div>
            </label>
        </div>
    </fieldset>

    <div>
        <input type="number" name="amount" step="0.01" min="0.01" required autofocus
            placeholder="0.00"
            class="w-full text-3xl font-bold text-center border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
            inputmode="decimal">
    </div>

    <div>
        <select name="account_id" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
            id="qe-account-select">
            <option value="">Select account...</option>
            {% for acc in accounts %}
            <option value="{{ acc.id }}" {% if acc.id == last_account_id %}selected{% endif %}>{{ acc.name }} ({{ acc.currency }})</option>
            {% endfor %}
        </select>
    </div>

    <input type="hidden" name="currency" value="EGP" id="qe-currency-input">

    <div>
        <div data-category-combobox
             data-categories='{{ categories|categories_json }}'
             data-name="category_id"
             data-selected-id="{{ auto_category_id|default:'' }}"
             data-placeholder="Search categories..."
             data-allow-empty="true"
             id="qe-category-combobox">
        </div>
    </div>

    <!-- Hidden date submitted when "More options" is collapsed -->
    <input type="hidden" name="date" id="qe-date-input" value="{{ today|date:'Y-m-d' }}">

    <div>
        <label class="block text-xs text-gray-500 mb-1" for="qe-note-input">Note (optional)</label>
        <input type="text" name="note" id="qe-note-input" placeholder="What was this for?"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- More options toggle -->
    <button type="button" id="qe-more-options-toggle"
        aria-expanded="false" aria-controls="qe-more-options"
        class="text-sm text-teal-600 hover:text-teal-800 font-medium flex items-center gap-1 transition-colors min-h-[44px]">
        <svg id="qe-more-options-chevron" class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
        More options<span id="qe-more-options-date-hint" class="text-gray-400 font-normal"></span>
    </button>

    <!-- Optional fields: date, virtual account -->
    <div id="qe-more-options" class="hidden space-y-4">
        <div>
            <label class="block text-xs text-gray-500 mb-1" for="qe-date-picker">Date</label>
            <input type="date" name="date" id="qe-date-picker" disabled
                value="{{ today|date:'Y-m-d' }}"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>
        {% if virtual_accounts %}
        <div>
            <label class="block text-xs text-gray-500 mb-1" for="qe-va-select">Virtual Account (optional)</label>
            <select name="virtual_account_id" id="qe-va-select"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="">None</option>
                {% for va in virtual_accounts %}
                <option value="{{ va.id }}" data-account-id="{{ va.account_id|default:'' }}">{{ va.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
    </div>

    <button type="submit"
        class="w-full bg-teal-600 text-white py-3 min-h-[44px] rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center">
        <span class="btn-label">Save</span>
        <span class="btn-spinner hidden">
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </span>
    </button>
</form>

<script>
(function() {
    // More options toggle — swaps hidden date input ↔ visible date picker
    var qeToggle = document.getElementById('qe-more-options-toggle');
    var qePanel = document.getElementById('qe-more-options');
    var qeChevron = document.getElementById('qe-more-options-chevron');
    var qeDatePicker = document.getElementById('qe-date-picker');
    var qeDateHidden = document.getElementById('qe-date-input');
    var qeDateHint = document.getElementById('qe-more-options-date-hint');
    var qeTodayIso = '{{ today|date:"Y-m-d" }}';

    function qeUpdateDateHint() {
        if (!qeDateHint || !qeDatePicker) return;
        var val = qeDatePicker.value;
        qeDateHint.textContent = (val && val !== qeTodayIso)
            ? ' · ' + new Date(val + 'T00:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
            : '';
    }

    qeToggle.addEventListener('click', function() {
        var expanded = qeToggle.getAttribute('aria-expanded') === 'true';
        qePanel.classList.toggle('hidden', expanded);
        qeToggle.setAttribute('aria-expanded', String(!expanded));
        if (qeChevron) qeChevron.style.transform = expanded ? '' : 'rotate(180deg)';
        if (qeDatePicker) qeDatePicker.disabled = expanded;
        if (qeDateHidden) qeDateHidden.disabled = !expanded;
        // Show date hint when collapsing with a non-today date
        if (expanded) qeUpdateDateHint(); else if (qeDateHint) qeDateHint.textContent = '';
    });

    var acctSelect = document.getElementById('qe-account-select');
    if (acctSelect && acctSelect.value) {
        var sel = acctSelect.options[acctSelect.selectedIndex];
        if (sel && sel.text.includes('USD')) {
            document.getElementById('qe-currency-input').value = 'USD';
        }
    }

    if (acctSelect) {
        acctSelect.addEventListener('change', function() {
            var sel = this.options[this.selectedIndex];
            document.getElementById('qe-currency-input').value = (sel && sel.text.includes('USD')) ? 'USD' : 'EGP';
            filterQeVirtualAccounts();
        });
    }

    function filterQeVirtualAccounts() {
        var vaSelect = document.getElementById('qe-va-select');
        if (!acctSelect || !vaSelect || !acctSelect.value) return;
        var selectedAcct = acctSelect.value;
        vaSelect.querySelectorAll('option').forEach(function(opt) {
            if (!opt.value) return;
            var vaAcctId = opt.getAttribute('data-account-id');
            var hide = vaAcctId && vaAcctId !== selectedAcct;
            opt.hidden = hide;
            opt.disabled = hide;
        });
        if (vaSelect.selectedOptions[0] && vaSelect.selectedOptions[0].hidden) {
            vaSelect.value = '';
        }
    }
    filterQeVirtualAccounts();

    var noteInput = document.getElementById('qe-note-input');
    var suggestTimer = null;
    if (noteInput) {
        noteInput.addEventListener('input', function() {
            clearTimeout(suggestTimer);
            var val = this.value.trim();
            if (val.length < 3) return;
            suggestTimer = setTimeout(function() {
                fetch('/api/transactions/suggest-category?note=' + encodeURIComponent(val))
                    .then(function(r) { return r.ok ? r.text() : ''; })
                    .then(function(catId) {
                        if (catId) {
                            var comboEl = document.getElementById('qe-category-combobox');
                            if (comboEl && comboEl._combobox && !comboEl._combobox.hiddenInput.value) {
                                comboEl._combobox.selectById(catId);
                            }
                        }
                    }).catch(function() {});
            }, 300);
        });
    }
})();
</script>
