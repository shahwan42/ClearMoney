{% load money %}
{% load i18n %}
<h3 class="text-lg font-bold text-slate-800 dark:text-slate-100 mb-4">{% trans "Quick Entry" %}</h3>

<div id="quick-entry-result" aria-live="polite"></div>

<form
    hx-post="/transactions/quick"
    hx-target="#quick-entry-result"
    hx-swap="innerHTML"
    hx-disabled-elt="find button[type='submit']"
    class="space-y-4 overflow-hidden"
    id="quick-entry-form"
>
    <fieldset class="border-0 p-0 m-0">
        <legend class="sr-only">{% trans "Transaction type" %}</legend>
        <div class="flex gap-2">
            <label class="flex-1">
                <input type="radio" name="type" value="expense" checked class="peer sr-only" onchange="qeToggleType('expense')">
                <div id="tab-transaction" class="peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-700 border-2 border-gray-100 dark:border-slate-700 rounded-2xl py-3 min-h-[48px] text-center text-sm font-semibold cursor-pointer transition-all flex items-center justify-center">
                    {% trans "Expense" %}
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="type" value="income" class="peer sr-only" onchange="qeToggleType('income')">
                <div class="peer-checked:bg-teal-50 peer-checked:border-teal-400 peer-checked:text-teal-700 border-2 border-gray-100 dark:border-slate-700 rounded-2xl py-3 min-h-[48px] text-center text-sm font-semibold cursor-pointer transition-all flex items-center justify-center">
                    {% trans "Income" %}
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="type" value="transfer" class="peer sr-only" onchange="qeToggleType('transfer')">
                <div id="tab-transfer" class="peer-checked:bg-blue-50 peer-checked:border-blue-400 peer-checked:text-blue-700 border-2 border-gray-100 dark:border-slate-700 rounded-2xl py-3 min-h-[48px] text-center text-sm font-semibold cursor-pointer transition-all flex items-center justify-center">
                    {% trans "Transfer" %}
                </div>
            </label>
        </div>
    </fieldset>

    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-amount">{% trans "Amount" %} <span class="text-red-500" aria-hidden="true">*</span></label>
        <input type="number" name="amount" id="qe-amount" step="0.01" min="0.01" required autofocus
            placeholder="0.00"
            class="w-full text-3xl font-bold text-center border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400"
            inputmode="decimal">
    </div>

    {# On tablet+, account and category display side-by-side #}
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-account-picker-input" id="qe-account-label">{% trans "Account" %} <span class="text-red-500" aria-hidden="true">*</span></label>
            <div data-account-combobox
                 data-accounts='{{ accounts|accounts_json }}'
                 data-expense-accounts='{{ expense_accounts|accounts_json }}'
                 data-income-accounts='{{ income_accounts|accounts_json }}'
                 data-transfer-accounts='{{ transfer_accounts|accounts_json }}'
                 data-name="account_id"
                 data-input-id="qe-account-picker-input"
                 data-labelledby="qe-account-label"
                 data-selected-id="{{ last_account_id|default:'' }}"
                 data-placeholder="{% trans "Search accounts..." %}"
                 data-required="true"
                 id="qe-account-combobox">
            </div>
        </div>

        <div id="qe-category-container">
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" id="qe-category-label">{% trans "Category" %}</label>
            <div data-category-combobox
                 data-categories='{{ categories|categories_json }}'
                 data-name="category_id"
                 data-selected-id="{{ auto_category_id|default:'' }}"
                 data-placeholder="{% trans "Search categories..." %}"
                 data-allow-empty="true"
                 id="qe-category-combobox">
            </div>
        </div>

        <div id="qe-dest-account-container" class="hidden">
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-dest-account-select">{% trans "To Account" %} <span class="text-red-500" aria-hidden="true">*</span></label>
            <select name="dest_account_id" id="qe-dest-account-select"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="">{% trans "Select destination..." %}</option>
                {% for acc in transfer_accounts %}
                <option value="{{ acc.id }}">{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <input type="hidden" name="currency" value="{{ last_account_currency|default:'EGP' }}" id="qe-currency-input">

    <!-- Hidden date submitted when "More options" is collapsed -->
    <input type="hidden" name="date" id="qe-date-input" value="{{ today|date:'Y-m-d' }}">

    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-note-input">{% trans "Note (optional)" %}</label>
        <input type="text" name="note" id="qe-note-input" maxlength="500" placeholder="{% trans "What was this for?" %}"
            class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <div id="qe-tags-container">
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-tags-input">{% trans "Tags (comma-separated)" %}</label>
        <input type="text" name="tags" id="qe-tags-input" maxlength="500" placeholder="{% trans "vacation, wedding..." %}"
            class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <!-- More options toggle -->
    <button type="button" id="qe-more-options-toggle"
        aria-expanded="false" aria-controls="qe-more-options"
        class="text-sm text-teal-600 hover:text-teal-800 font-medium flex items-center gap-1 transition-colors min-h-[44px]">
        <svg id="qe-more-options-chevron" class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
        {% trans "More options" %}<span id="qe-more-options-date-hint" class="text-gray-400 font-normal"></span>
    </button>

    <!-- Optional fields: date, virtual account -->
    <div id="qe-more-options" class="hidden space-y-4 overflow-hidden">
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-date-picker">{% trans "Date" %}</label>
            <input type="date" name="date" id="qe-date-picker" disabled
                value="{{ today|date:'Y-m-d' }}" max="{{ today|date:'Y-m-d' }}"
                class="w-full min-w-0 max-w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
        </div>
        <!-- Fee (optional) -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-fee-input">{% trans "Fee (optional)" %}</label>
            <input type="number" name="fee_amount" id="qe-fee-input" step="0.01" min="0" placeholder="0.00"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
        </div>

        {% if virtual_accounts %}
        <div id="qe-va-container">
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="qe-va-select">{% trans "Virtual Account (optional)" %}</label>
            <select name="virtual_account_id" id="qe-va-select"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="">{% trans "None" %}</option>
                {% for va in virtual_accounts %}
                <option value="{{ va.id }}" data-account-id="{{ va.account_id|default:'' }}">{{ va.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
    </div>

    <button type="submit"
        class="relative w-full bg-teal-600 text-white py-3 min-h-[44px] rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center overflow-hidden">
        <span class="btn-label" id="qe-submit-label">{% trans "Save" %}</span>
        <span class="btn-spinner hidden">
            <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
        </span>
    </button>
</form>

<script>
/**
 * Toggle between Transaction (Expense/Income) and Transfer modes.
 */
function qeToggleType(mode) {
    var isTransfer = (mode === 'transfer');
    
    // Toggle containers
    document.getElementById('qe-category-container').classList.toggle('hidden', isTransfer);
    document.getElementById('qe-tags-container').classList.toggle('hidden', isTransfer);
    document.getElementById('qe-dest-account-container').classList.toggle('hidden', !isTransfer);
    
    var vaCont = document.getElementById('qe-va-container');
    if (vaCont) vaCont.classList.toggle('hidden', isTransfer);

    // Toggle required status
    var destSelect = document.getElementById('qe-dest-account-select');
    if (destSelect) destSelect.required = isTransfer;

    // Update labels
    var acctLabel = document.getElementById('qe-account-label');
    if (acctLabel) {
        acctLabel.innerHTML = isTransfer 
            ? '{% trans "From Account" %} <span class="text-red-500" aria-hidden="true">*</span>'
            : '{% trans "Account" %} <span class="text-red-500" aria-hidden="true">*</span>';
    }

    var submitLabel = document.getElementById('qe-submit-label');
    if (submitLabel) {
        submitLabel.textContent = isTransfer ? '{% trans "Transfer" %}' : '{% trans "Save" %}';
    }

    qeApplyAccountRanking(mode);
}

function qeAccountListForType(mode) {
    var comboEl = document.getElementById('qe-account-combobox');
    if (!comboEl) return [];
    var attr = 'data-expense-accounts';
    if (mode === 'income') attr = 'data-income-accounts';
    if (mode === 'transfer') attr = 'data-transfer-accounts';
    return JSON.parse(comboEl.getAttribute(attr) || '[]');
}

function qeApplyAccountRanking(mode) {
    var comboEl = document.getElementById('qe-account-combobox');
    if (!window.AccountCombobox || !comboEl) return;
    if (!comboEl._accountCombobox) new AccountCombobox(comboEl);
    comboEl._accountCombobox.setAccounts(qeAccountListForType(mode));
}

(function() {
    // More options toggle — swaps hidden date input ↔ visible date picker
    var qeToggle = document.getElementById('qe-more-options-toggle');
    var qePanel = document.getElementById('qe-more-options');
    var qeChevron = document.getElementById('qe-more-options-chevron');
    var qeDatePicker = document.getElementById('qe-date-picker');
    var qeDateHidden = document.getElementById('qe-date-input');
    var qeDateHint = document.getElementById('qe-more-options-date-hint');
    var qeTodayIso = '{{ today|date:"Y-m-d" }}';

    function qeUpdateDateHint() {
        if (!qeDateHint || !qeDatePicker) return;
        var val = qeDatePicker.value;
        qeDateHint.textContent = (val && val !== qeTodayIso)
            ? ' · ' + new Date(val + 'T00:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
            : '';
    }

    qeToggle.addEventListener('click', function() {
        var expanded = qeToggle.getAttribute('aria-expanded') === 'true';
        qePanel.classList.toggle('hidden', expanded);
        qeToggle.setAttribute('aria-expanded', String(!expanded));
        if (qeChevron) qeChevron.style.transform = expanded ? '' : 'rotate(180deg)';
        if (qeDatePicker) qeDatePicker.disabled = expanded;
        if (qeDateHidden) qeDateHidden.disabled = !expanded;
        // Show date hint when collapsing with a non-today date
        if (expanded) qeUpdateDateHint(); else if (qeDateHint) qeDateHint.textContent = '';
    });

    var acctComboEl = document.getElementById('qe-account-combobox');
    if (window.AccountCombobox && acctComboEl && !acctComboEl._accountCombobox) {
        new AccountCombobox(acctComboEl);
    }
    var selectedType = document.querySelector('input[name="type"]:checked');
    qeApplyAccountRanking(selectedType ? selectedType.value : 'expense');

    var acctInput = document.querySelector('#qe-account-combobox input[name="account_id"]');
    if (acctInput && acctInput.value) {
        document.getElementById('qe-currency-input').value = acctInput.dataset.currency || 'EGP';
    }

    if (acctInput) {
        acctInput.addEventListener('change', function() {
            document.getElementById('qe-currency-input').value = this.dataset.currency || 'EGP';
            filterQeVirtualAccounts();
        });
    }

    function filterQeVirtualAccounts() {
        var vaSelect = document.getElementById('qe-va-select');
        if (!acctInput || !vaSelect || !acctInput.value) return;
        var selectedAcct = acctInput.value;
        vaSelect.querySelectorAll('option').forEach(function(opt) {
            if (!opt.value) return;
            var vaAcctId = opt.getAttribute('data-account-id');
            var hide = vaAcctId && vaAcctId !== selectedAcct;
            opt.hidden = hide;
            opt.disabled = hide;
        });
        if (vaSelect.selectedOptions[0] && vaSelect.selectedOptions[0].hidden) {
            vaSelect.value = '';
        }
    }
    filterQeVirtualAccounts();

    var noteInput = document.getElementById('qe-note-input');
    var suggestTimer = null;
    if (noteInput) {
        noteInput.addEventListener('input', function() {
            clearTimeout(suggestTimer);
            var val = this.value.trim();
            if (val.length < 3) return;
            suggestTimer = setTimeout(function() {
                fetch('/api/transactions/suggest-category?note=' + encodeURIComponent(val))
                    .then(function(r) { return r.ok ? r.text() : ''; })
                    .then(function(catId) {
                        if (catId) {
                            var comboEl = document.getElementById('qe-category-combobox');
                            if (comboEl && comboEl._combobox && !comboEl._combobox.hiddenInput.value) {
                                comboEl._combobox.selectById(catId);
                            }
                        }
                    }).catch(function() {});
            }, 300);
        });
    }
})();
</script>
