{% load i18n %}
<div>
    <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-ex-dest">{% trans "To account" %}</label>
    <select name="exchange_dest_id" id="edit-ex-dest" required
            class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500"
            aria-label="{% trans "Destination account" %}">
        {% for acc in dest_accounts %}
        <option value="{{ acc.id }}" {% if acc.id|stringformat:"s" == exchange_dest_id %}selected{% endif %}>
            {{ acc.name }} ({{ acc.currency }})
        </option>
        {% endfor %}
    </select>
</div>

<div class="grid grid-cols-2 gap-3">
    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-ex-counter">
            {% trans "Received" %}{% if dest_currency %} ({{ dest_currency }}){% endif %}
        </label>
        <input type="number" name="counter_amount" id="edit-ex-counter"
               value="{% if not pair_changed %}{{ tx.counter_amount }}{% endif %}"
               step="0.01" min="0.01"
               class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>
    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-ex-rate">
            {% if rate_label %}{% trans "Rate" %} ({{ rate_label }}){% else %}{% trans "Rate" %}{% endif %}
        </label>
        <input type="number" name="rate" id="edit-ex-rate"
               value="{% if not pair_changed %}{{ tx.exchange_rate }}{% endif %}"
               step="0.000001" min="0" placeholder="e.g. 50.5"
               class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>
</div>
