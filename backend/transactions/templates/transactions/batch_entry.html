{% extends "base.html" %}
{% load money %}

{% block title %}ClearMoney - Batch Entry{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto space-y-4 py-4">
    <h2 class="text-lg font-bold text-slate-800">Batch Entry</h2>
    <p class="text-sm text-gray-500">Add multiple transactions at once — useful for catching up on missed days.</p>

    <form hx-post="/transactions/batch" hx-target="#batch-result" hx-disabled-elt="find button[type='submit']" class="space-y-3">
        <div id="batch-rows" class="space-y-3">
            <div class="batch-row bg-white rounded-xl shadow-sm p-4 space-y-2">
                <div class="flex gap-2">
                    <select name="type[]" aria-label="Type" data-batch-reset="expense" class="border rounded-lg px-2 py-1.5 text-sm">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                    <input type="number" name="amount[]" step="0.01" placeholder="Amount" aria-label="Amount" required
                           class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                </div>
                <div class="flex gap-2">
                    <select name="account_id[]" aria-label="Account" data-batch-reset="" class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                        {% for acc in accounts %}
                        <option value="{{ acc.id }}">{{ acc.name }}</option>
                        {% endfor %}
                    </select>
                    <select name="category_id[]" aria-label="Category" data-batch-reset="" class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                        <option value="">-- Category --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{% if cat.icon %}{{ cat.icon }} {% endif %}{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="flex gap-2">
                    <input type="date" name="date[]" value="{{ today|date:'Y-m-d' }}" aria-label="Date" required class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                    <input type="text" name="note[]" placeholder="Note" aria-label="Note" class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                </div>
            </div>
        </div>

        <button type="button" onclick="addBatchRow()" class="w-full border-2 border-dashed border-gray-300 hover:border-teal-400 hover:text-teal-600 dark:border-slate-600 dark:text-slate-400 dark:hover:border-teal-500 dark:hover:text-teal-400 text-gray-500 py-2 rounded-lg text-sm transition-colors">
            + Add Another Row
        </button>

        <button type="submit" class="relative w-full bg-teal-600 text-white py-2.5 min-h-[44px] rounded-lg text-sm font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center overflow-hidden">
            <span class="btn-label">Submit All</span>
            <span class="btn-spinner hidden">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </span>
        </button>
    </form>

    <div id="batch-result" aria-live="polite"></div>

    <script>
    var todayISO = new Date().toISOString().split('T')[0];
    document.querySelectorAll('#batch-rows input[type="date"]').forEach(function(d) { if (!d.value) d.value = todayISO; });

    function addBatchRow() {
        var rows = document.getElementById('batch-rows');
        var first = rows.querySelector('.batch-row');
        var clone = first.cloneNode(true);
        // Reset text/number inputs
        clone.querySelectorAll('input').forEach(function(i) { if (i.type !== 'date') i.value = ''; });
        clone.querySelector('input[type="date"]').value = todayISO;
        // Reset selects to their default values via data-batch-reset attribute
        clone.querySelectorAll('select[data-batch-reset]').forEach(function(sel) {
            var defaultVal = sel.getAttribute('data-batch-reset');
            sel.value = defaultVal;
        });
        rows.appendChild(clone);
    }
    </script>
</div>
{% endblock %}
