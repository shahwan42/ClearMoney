{% extends "base.html" %}
{% load money %}

{% block title %}ClearMoney - Batch Entry{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto space-y-4 py-4">
    <h2 class="text-lg font-bold text-slate-800">Batch Entry</h2>
    <p class="text-sm text-gray-500">Add multiple transactions at once — useful for catching up on missed days.</p>

    <form hx-post="/transactions/batch" hx-target="#batch-result" class="space-y-3">
        <div id="batch-rows" class="space-y-3">
            <div class="batch-row bg-white rounded-xl shadow-sm p-4 space-y-2">
                <div class="flex gap-2">
                    <select name="type[]" class="border rounded-lg px-2 py-1.5 text-sm">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                    </select>
                    <input type="number" name="amount[]" step="0.01" placeholder="Amount" required
                           class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                </div>
                <div class="flex gap-2">
                    <select name="account_id[]" class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                        {% for acc in accounts %}
                        <option value="{{ acc.id }}">{{ acc.name }}</option>
                        {% endfor %}
                    </select>
                    <select name="category_id[]" class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                        <option value="">-- Category --</option>
                        {% for cat in expense_categories %}
                        <option value="{{ cat.id }}">{% if cat.icon %}{{ cat.icon }} {% endif %}{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="flex gap-2">
                    <input type="date" name="date[]" value="{{ today|date:'Y-m-d' }}" required class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                    <input type="text" name="note[]" placeholder="Note" class="flex-1 border rounded-lg px-2 py-1.5 text-sm">
                </div>
            </div>
        </div>

        <button type="button" onclick="addBatchRow()" class="w-full border-2 border-dashed border-gray-300 text-gray-500 py-2 rounded-lg text-sm">
            + Add Another Row
        </button>

        <button type="submit" class="w-full bg-teal-600 text-white py-2.5 rounded-lg text-sm font-semibold">
            Submit All
        </button>
    </form>

    <div id="batch-result" aria-live="polite"></div>

    <script>
    var todayISO = new Date().toISOString().split('T')[0];
    document.querySelectorAll('#batch-rows input[type="date"]').forEach(function(d) { if (!d.value) d.value = todayISO; });

    function addBatchRow() {
        var rows = document.getElementById('batch-rows');
        var first = rows.querySelector('.batch-row');
        var clone = first.cloneNode(true);
        clone.querySelectorAll('input').forEach(function(i) { if (i.type !== 'date') i.value = ''; });
        clone.querySelector('input[type="date"]').value = todayISO;
        rows.appendChild(clone);
    }
    </script>
</div>
{% endblock %}
