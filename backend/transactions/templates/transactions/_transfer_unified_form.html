{% load money %}
{% load i18n %}
<div id="transfer-unified-content" class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm p-5 space-y-4">
    <h2 class="text-base font-bold text-slate-800 dark:text-white">{% trans "Transfer" %}</h2>
    <form id="transfer-unified-form" hx-post="/transactions/transfer" hx-target="#transfer-unified-content" hx-swap="innerHTML"
          hx-disabled-elt="find button[type='submit']"
          class="space-y-3 overflow-hidden">
        <div>
            <label for="transfer-src" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "From Account" %}</label>
            <select name="source_account_id" id="transfer-src" required
                    onchange="updateTransferMode()"
                    class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
                <option value="">{% trans "Select source..." %}</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}" data-currency="{{ acc.currency }}"
                    {% if prefill and acc.id == prefill.account_id %}selected{% endif %}>{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label for="transfer-dst" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "To Account" %}</label>
            <select name="dest_account_id" id="transfer-dst" required
                    onchange="updateTransferMode()"
                    class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
                <option value="">{% trans "Select destination..." %}</option>
                {% for acc in accounts %}
                <option value="{{ acc.id }}" data-currency="{{ acc.currency }}"
                    {% if prefill and acc.id == prefill.counter_account_id %}selected{% endif %}>{{ acc.name }} ({{ acc.currency }})</option>
                {% endfor %}
            </select>
        </div>

        {# Mode indicator — announces mode to screen readers #}
        <div id="transfer-mode-indicator" aria-live="polite" class="hidden text-xs font-medium px-3 py-1.5 rounded-lg text-center"></div>

        <div>
            <label for="transfer-amount" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Amount" %}</label>
            <input type="number" name="amount" id="transfer-amount" step="0.01" min="0.01" required
                   {% if prefill and prefill.amount %}value="{{ prefill.amount }}"{% endif %}
                   class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm"
                   oninput="onTransferAmountInput()">
        </div>

        {# Transfer-only fields: fee #}
        <div id="transfer-transfer-fields" class="hidden space-y-3" aria-hidden="true">
            <div>
                <label for="transfer-fee" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Fee (optional)" %}</label>
                <input type="number" name="fee_amount" id="transfer-fee" step="0.01" min="0" placeholder="0.00" disabled
                       class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm"
                       oninput="updateTransferTotal()">
            </div>
            <div id="transfer-total-display" class="hidden bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded-lg p-2 text-xs text-slate-600 dark:text-slate-300">
                {% trans "Total from source:" %} <span id="transfer-total-value" class="font-semibold">0.00</span>
            </div>
        </div>

        {# Exchange-only fields: rate + counter amount #}
        <div id="transfer-exchange-fields" class="hidden" aria-hidden="true">
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label for="transfer-rate" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Rate" %}</label>
                    <input type="number" name="rate" id="transfer-rate" step="0.0001" min="0.0001" disabled
                           class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm"
                           oninput="calcTransferExchange('rate')">
                </div>
                <div>
                    <label for="transfer-counter" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Result" %}</label>
                    <input type="number" name="counter_amount" id="transfer-counter" step="0.01" min="0.01" disabled
                           class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm"
                           oninput="calcTransferExchange('counter')">
                </div>
            </div>
        </div>

        <div>
            <label for="transfer-note" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Note (optional)" %}</label>
            <input type="text" name="note" id="transfer-note" maxlength="500"
                   {% if prefill and prefill.note %}value="{{ prefill.note }}"{% endif %}
                   class="w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
        </div>

        <div>
            <label for="transfer-date" class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Date" %}</label>
            <input type="date" name="date" id="transfer-date" value="{{ today|date:'Y-m-d' }}" max="{{ today|date:'Y-m-d' }}"
                   class="w-full min-w-0 max-w-full border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-white rounded-xl px-3 py-2.5 text-sm">
        </div>

        <button type="submit"
                class="relative w-full bg-teal-600 text-white py-3 min-h-[44px] rounded-xl text-sm font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center overflow-hidden">
            <span class="btn-label" id="transfer-submit-label">{% trans "Transfer" %}</span>
            <span class="btn-spinner hidden">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </span>
        </button>
    </form>
</div>
<script src="/static/js/transfer-unified.js"></script>
{% if prefill %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    updateTransferMode();
    {% if prefill.exchange_rate %}
    var rateEl = document.getElementById('transfer-rate');
    var counterEl = document.getElementById('transfer-counter');
    if (rateEl) rateEl.value = '{{ prefill.exchange_rate }}';
    if (counterEl) counterEl.value = '{{ prefill.counter_amount }}';
    {% endif %}
});
</script>
{% endif %}
