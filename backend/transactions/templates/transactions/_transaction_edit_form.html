{% load money %}
<div class="bg-white rounded-xl shadow-sm p-4 space-y-3" id="tx-{{ tx.id }}">
    <form hx-put="/transactions/{{ tx.id }}" hx-target="#tx-{{ tx.id }}" hx-swap="outerHTML" class="space-y-3">
        <div class="grid grid-cols-2 gap-2">
            <select name="type" class="text-sm border border-gray-200 rounded-lg px-2 py-1.5">
                <option value="expense" {% if tx.type == "expense" %}selected{% endif %}>Expense</option>
                <option value="income" {% if tx.type == "income" %}selected{% endif %}>Income</option>
            </select>
            <input type="number" name="amount" value="{{ tx.amount }}" step="0.01" min="0.01"
                   class="text-sm border border-gray-200 rounded-lg px-2 py-1.5" required>
        </div>

        <select name="category_id" class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">
            <option value="">No category</option>
            <optgroup label="Expense">
                {% for cat in categories %}{% if cat.type == "expense" %}
                <option value="{{ cat.id }}" {% if cat.id == selected_category_id %}selected{% endif %}>{% if cat.icon %}{{ cat.icon }} {% endif %}{{ cat.name }}</option>
                {% endif %}{% endfor %}
            </optgroup>
            <optgroup label="Income">
                {% for cat in categories %}{% if cat.type == "income" %}
                <option value="{{ cat.id }}" {% if cat.id == selected_category_id %}selected{% endif %}>{% if cat.icon %}{{ cat.icon }} {% endif %}{{ cat.name }}</option>
                {% endif %}{% endfor %}
            </optgroup>
        </select>

        <input type="text" name="note" value="{{ tx.note|default:'' }}"
               placeholder="Note (optional)"
               class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">

        <input type="date" name="date" value="{{ tx.date|date:'Y-m-d' }}"
               class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">

        {% if virtual_accounts %}
        <!-- More options toggle (only shown when there's something to reveal) -->
        <button type="button" class="edit-more-toggle text-xs text-teal-600 hover:text-teal-800 font-medium flex items-center gap-1 transition-colors min-h-[44px]"
            aria-expanded="false" aria-controls="edit-more-options-{{ tx.id }}">
            <svg class="edit-more-chevron w-3 h-3 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
            More options
        </button>

        <!-- Optional fields: virtual account -->
        <div id="edit-more-options-{{ tx.id }}" class="hidden space-y-4">
            <select name="virtual_account_id" class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">
                <option value="">No virtual account</option>
                {% for va in virtual_accounts %}
                <option value="{{ va.id }}" data-account-id="{{ va.account_id|default:'' }}" {% if va.id == selected_va_id %}selected{% endif %}>{{ va.name }}</option>
                {% endfor %}
            </select>
        </div>
        <script>
        (function() {
            var panel = document.getElementById('edit-more-options-{{ tx.id }}');
            var btn = document.querySelector('[aria-controls="edit-more-options-{{ tx.id }}"]');
            if (!panel || !btn) return;

            function openEditMore() {
                panel.classList.remove('hidden');
                btn.setAttribute('aria-expanded', 'true');
                var chevron = btn.querySelector('.edit-more-chevron');
                if (chevron) chevron.style.transform = 'rotate(180deg)';
            }

            btn.addEventListener('click', function() {
                if (btn.getAttribute('aria-expanded') === 'true') {
                    panel.classList.add('hidden');
                    btn.setAttribute('aria-expanded', 'false');
                    var chevron = btn.querySelector('.edit-more-chevron');
                    if (chevron) chevron.style.transform = '';
                } else {
                    openEditMore();
                }
            });

            // Auto-expand if a VA is already selected
            {% if selected_va_id %}openEditMore();{% endif %}
        })();
        </script>
        {% endif %}

        <input type="hidden" name="currency" value="{{ tx.currency }}">
        <input type="hidden" name="account_id" value="{{ tx.account_id }}">

        <div class="flex gap-2">
            <button type="submit"
                    class="flex-1 bg-teal-600 text-white text-sm py-2 rounded-lg font-medium hover:bg-teal-700">
                Save
            </button>
            <button type="button"
                    hx-get="/transactions/row/{{ tx.id }}" hx-target="#tx-{{ tx.id }}" hx-swap="outerHTML"
                    class="flex-1 bg-gray-100 text-gray-600 text-sm py-2 rounded-lg font-medium hover:bg-gray-200">
                Cancel
            </button>
        </div>
    </form>
</div>
