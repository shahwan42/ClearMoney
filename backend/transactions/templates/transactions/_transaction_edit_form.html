{% load money %}
{% load i18n %}
<h3 class="font-semibold text-slate-800 dark:text-slate-100 text-sm mb-3">{% trans "Edit Transaction" %}</h3>
<div id="edit-tx-result" aria-live="polite"></div>

<form hx-put="/transactions/{{ tx.id }}"
      hx-target="#edit-tx-result"
      hx-swap="innerHTML"
      hx-disabled-elt="find button[type='submit']"
      class="space-y-3 overflow-hidden">
    <div class="grid grid-cols-2 gap-2">
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-tx-type">{% trans "Type" %}</label>
            <select name="type" id="edit-tx-type"
                class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="expense" {% if tx.type == "expense" %}selected{% endif %}>{% trans "Expense" %}</option>
                <option value="income" {% if tx.type == "income" %}selected{% endif %}>{% trans "Income" %}</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-tx-amount">{% trans "Amount" %}</label>
            <input type="number" name="amount" id="edit-tx-amount" value="{{ tx.amount }}" step="0.01" min="0.01"
                   class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400" required>
        </div>
    </div>

    <div data-category-combobox
         data-categories='{{ categories|categories_json }}'
         data-name="category_id"
         data-selected-id="{{ selected_category_id|default:'' }}"
         data-placeholder="{% trans "Search categories..." %}"
         data-allow-empty="true">
    </div>

    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-tx-note">{% trans "Note (optional)" %}</label>
        <input type="text" name="note" id="edit-tx-note" value="{{ tx.note|default:'' }}"
               maxlength="500" placeholder="{% trans "What was this for?" %}"
               class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-tx-date">{% trans "Date" %}</label>
        <input type="date" name="date" id="edit-tx-date" value="{{ tx.date|date:'Y-m-d' }}"
               class="w-full min-w-0 max-w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
    </div>

    <button type="button" class="edit-more-toggle text-xs text-teal-600 dark:text-teal-400 hover:text-teal-800 font-medium flex items-center gap-1 transition-colors min-h-[44px]"
        aria-expanded="false" aria-controls="edit-more-options-{{ tx.id }}">
        <svg class="edit-more-chevron w-3 h-3 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
        {% trans "More options" %}
    </button>

    <div id="edit-more-options-{{ tx.id }}" class="hidden space-y-4">
        <!-- Fee (optional) -->
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1" for="edit-tx-fee">{% trans "Fee (optional)" %}</label>
            <input type="number" name="fee_amount" id="edit-tx-fee" step="0.01" min="0" placeholder="0.00"
                value="{{ existing_fee_amount }}"
                class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
        </div>
        {% if virtual_accounts %}
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">{% trans "Virtual Account" %}</label>
            <select name="virtual_account_id"
                class="w-full text-sm border border-gray-200 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-100 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 dark:focus:ring-teal-400">
                <option value="">{% trans "No virtual account" %}</option>
                {% for va in virtual_accounts %}
                <option value="{{ va.id }}" data-account-id="{{ va.account_id|default:'' }}" {% if va.id == selected_va_id %}selected{% endif %}>{{ va.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% endif %}
    </div>
    <script>
    (function() {
        var panel = document.getElementById('edit-more-options-{{ tx.id }}');
        var btn = document.querySelector('[aria-controls="edit-more-options-{{ tx.id }}"]');
        if (!panel || !btn) return;

        function openEditMore() {
            panel.classList.remove('hidden');
            btn.setAttribute('aria-expanded', 'true');
            var chevron = btn.querySelector('.edit-more-chevron');
            if (chevron) chevron.style.transform = 'rotate(180deg)';
        }

        btn.addEventListener('click', function() {
            if (btn.getAttribute('aria-expanded') === 'true') {
                panel.classList.add('hidden');
                btn.setAttribute('aria-expanded', 'false');
                var chevron = btn.querySelector('.edit-more-chevron');
                if (chevron) chevron.style.transform = '';
            } else {
                openEditMore();
            }
        });

        {% if selected_va_id or existing_fee_amount %}openEditMore();{% endif %}
    })();
    </script>

    <input type="hidden" name="currency" value="{{ tx.currency }}">
    <input type="hidden" name="account_id" value="{{ tx.account_id }}">

    <div class="flex gap-2">
        <button type="submit"
                class="relative flex-1 bg-teal-600 text-white text-sm py-2 min-h-[44px] rounded-lg font-medium hover:bg-teal-700 active:scale-[0.98] transition-all flex items-center justify-center overflow-hidden">
            <span class="btn-label">{% trans "Save" %}</span>
            <span class="btn-spinner hidden">
                <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
            </span>
        </button>
        <button type="button" onclick="BottomSheet.close('tx-edit')"
                class="flex-1 bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300 text-sm py-2 min-h-[44px] rounded-lg font-medium hover:bg-gray-200 dark:hover:bg-slate-600 flex items-center justify-center">
            {% trans "Cancel" %}
        </button>
    </div>
</form>
