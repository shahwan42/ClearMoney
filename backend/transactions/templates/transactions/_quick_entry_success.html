{% load i18n %}
<div class="flex flex-col items-center py-8 space-y-4" role="status" aria-live="polite">
    <div class="animate-success">
        <svg class="w-16 h-16 text-teal-500" viewBox="0 0 52 52" aria-hidden="true">
            <circle class="stroke-current opacity-20" cx="26" cy="26" r="25" fill="none" stroke-width="2"/>
            <path class="animate-checkmark stroke-current" fill="none" stroke-width="3"
                  stroke-linecap="round" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
        </svg>
    </div>
    <p class="text-lg font-semibold text-gray-900 dark:text-slate-100">{% trans "Transaction saved!" %}</p>
    <div class="flex gap-3 w-full">
        <button type="button"
                onclick="htmx.ajax('GET','/transactions/quick-form',{target:'#quick-entry-content',swap:'innerHTML'})"
                class="flex-1 bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-slate-200 py-2.5 rounded-lg text-sm font-semibold hover:bg-gray-200 dark:hover:bg-slate-600 transition">
            {% trans "Add Another" %}
        </button>
        <button type="button"
                onclick="BottomSheet.close('quick-entry')"
                class="flex-1 bg-teal-600 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-teal-700 transition">
            {% trans "Done" %}
        </button>
    </div>
</div>
