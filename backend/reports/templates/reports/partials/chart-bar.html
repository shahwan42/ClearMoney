{% load money %}
{% load i18n %}

<div class="chart-bar-container" role="img" aria-label="{% trans "Monthly income vs expenses bar chart — last 6 months" %}">
    <div class="chart-bar-area">
        {% for group in data.bar_groups %}
        <div class="chart-bar-group">
            {% for bar in group.bars %}
            <div class="chart-bar" style="{% bar_style bar.height_pct bar.color %}" title="{{ bar.label }}"></div>
            {% endfor %}
        </div>
        {% endfor %}
    </div>
    <div class="chart-bar-labels">
        {% for group in data.bar_groups %}
        <span class="chart-bar-label">{{ group.label }}</span>
        {% endfor %}
    </div>
    {% if data.bar_legend %}
    <div class="chart-legend">
        {% for item in data.bar_legend %}
        <div class="chart-legend-item">
            <span class="chart-legend-dot" style="background-color: {{ item.color }}"></span>
            <span>{{ item.label }}</span>
        </div>
        {% endfor %}
    </div>
    {% endif %}
</div>
