{% load money %}
{% load i18n %}

<div class="chart-donut-wrap" role="img" aria-label="{% trans "Spending breakdown" %}: {{ data.total_spending|format_currency:data.filter_currency }} {% trans "total across" %} {{ data.spending_by_category|length }} {% trans "categories" %}">
    <div class="chart-donut" style="background: {% conic_gradient data.chart_segments %}">
        <div class="chart-donut-hole">
            {% with cur=data.filter_currency %}
            <span class="chart-donut-value">{{ data.total_spending|format_currency:cur }}</span>
            {% endwith %}
            <span class="chart-donut-sublabel">{% trans "total" %}</span>
        </div>
    </div>
</div>
