<!-- Step 2: Enter exchange rate -->
<div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm p-5 space-y-4">
    <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-slate-400">
        <span class="w-6 h-6 rounded-full bg-teal-600 text-white text-xs flex items-center justify-center font-bold">2</span>
        <span>Exchange Rate</span>
    </div>

    <div class="bg-gray-50 dark:bg-slate-700 rounded-lg p-3 text-sm dark:text-slate-200">
        Salary: <span class="font-bold">${{ salary_usd }}</span>
    </div>

    <form hx-post="/salary/step3" hx-target="#salary-wizard" hx-swap="innerHTML" class="space-y-3">
        {% csrf_token %}
        <input type="hidden" name="salary_usd" value="{{ salary_usd }}">
        <input type="hidden" name="usd_account_id" value="{{ usd_account_id }}">
        <input type="hidden" name="egp_account_id" value="{{ egp_account_id }}">
        <input type="hidden" name="date" value="{{ date }}">

        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Exchange Rate (EGP per USD)</label>
            <input type="number" name="exchange_rate" step="0.01" min="0.01" required autofocus
                   placeholder="50.50" id="salary-rate"
                   class="w-full text-xl font-bold text-center border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
                   inputmode="decimal"
                   oninput="updateSalaryEGP()">
        </div>

        <div class="bg-teal-50 dark:bg-teal-900/30 rounded-lg p-3 text-center">
            <p class="text-xs text-teal-600 dark:text-teal-400">EGP Equivalent</p>
            <p class="text-2xl font-bold text-teal-700 dark:text-teal-300" id="salary-egp">EGP 0.00</p>
        </div>

        <button type="submit"
                class="w-full bg-teal-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-teal-700">
            Next: Allocations
        </button>
    </form>
</div>

<script>
function updateSalaryEGP() {
    var usd = {{ salary_usd }};
    var rate = parseFloat(document.getElementById('salary-rate').value) || 0;
    var egp = usd * rate;
    document.getElementById('salary-egp').textContent = 'EGP ' + egp.toFixed(2);
}
</script>
