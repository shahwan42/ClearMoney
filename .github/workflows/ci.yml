name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clearmoney
          POSTGRES_PASSWORD: clearmoney
          POSTGRES_DB: clearmoney
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install Python dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run mypy
        working-directory: backend
        env:
          DATABASE_URL: postgres://clearmoney:clearmoney@localhost:5432/clearmoney?sslmode=disable
        run: uv run mypy .

      - name: Run ruff
        working-directory: backend
        run: uv run ruff check .

      - name: Apply database migrations
        working-directory: backend
        env:
          DATABASE_URL: postgres://clearmoney:clearmoney@localhost:5432/clearmoney?sslmode=disable
        run: uv run python manage.py migrate

      - name: Run Django tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgres://clearmoney:clearmoney@localhost:5432/clearmoney?sslmode=disable
        run: uv run pytest --cov --cov-fail-under=60

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run e2e tests
        env:
          DATABASE_URL: postgres://clearmoney:clearmoney@localhost:5432/clearmoney?sslmode=disable
          DISABLE_RATE_LIMIT: "true"
        working-directory: e2e
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      - name: Build Docker image
        run: docker build -t clearmoney:ci -f backend/Dockerfile .
