name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgres://clearmoney:clearmoney@localhost:5432/clearmoney?sslmode=disable

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run ruff check
        working-directory: backend
        run: uv run ruff check .

      - name: Run ruff format check
        working-directory: backend
        run: uv run ruff format --check .

      - name: Run mypy
        working-directory: backend
        run: uv run mypy .

      - name: Check import boundaries
        working-directory: backend
        run: uv run lint-imports

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clearmoney
          POSTGRES_PASSWORD: clearmoney
          POSTGRES_DB: clearmoney
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Apply database migrations
        working-directory: backend
        run: uv run python manage.py migrate

      - name: Run tests in parallel with coverage
        working-directory: backend
        env:
          DISABLE_RATE_LIMIT: "true"
        run: uv run pytest -n auto --cov --cov-fail-under=60

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clearmoney
          POSTGRES_PASSWORD: clearmoney
          POSTGRES_DB: clearmoney
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Apply database migrations
        working-directory: backend
        run: uv run python manage.py migrate

      - name: Install e2e dependencies
        working-directory: e2e
        run: uv sync

      - name: Install Playwright browser
        working-directory: e2e
        run: uv run playwright install chromium --with-deps

      - name: Run e2e tests
        env:
          DISABLE_RATE_LIMIT: "true"
        working-directory: e2e
        run: uv run pytest -v

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        # Builds from root context to access workspace pyproject.toml + uv.lock
        # Dockerfile copies root workspace config + backend config → creates /app/.venv
        run: docker build -t clearmoney:ci -f backend/Dockerfile .
