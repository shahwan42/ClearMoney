name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clearmoney
          POSTGRES_PASSWORD: clearmoney
          POSTGRES_DB: clearmoney
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Run unit tests
        run: go test ./internal/config/ ./internal/models/ -v

      - name: Run integration tests
        env:
          TEST_DATABASE_URL: postgres://clearmoney:clearmoney@localhost:5432/clearmoney?sslmode=disable
        run: go test -p 1 -v ./...

      - name: Build binary
        run: go build -o server ./cmd/server/

      - name: Build Docker image
        run: docker build -t clearmoney:ci .
