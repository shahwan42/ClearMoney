# Docker Compose configuration for local development.
#
# Services: Django app, background jobs (cron), PostgreSQL database.
#
# Usage:
#   docker compose up -d    # start in background
#   docker compose down     # stop all services
#   docker compose logs -f  # follow logs

services:
  # Django application — serves all routes via gunicorn.
  django:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgres://clearmoney:clearmoney@db:5432/clearmoney?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Django background jobs (cron) — runs startup jobs then periodic tasks hourly.
  # Like Laravel's scheduler (`php artisan schedule:run`) or Celery beat.
  django-cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      - DATABASE_URL=postgres://clearmoney:clearmoney@db:5432/clearmoney?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
      django:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py run_startup_jobs &&
        while true; do
          sleep 3600;
          python manage.py refresh_views;
          python manage.py take_snapshots;
          python manage.py cleanup_sessions;
        done
      "

  # PostgreSQL 16 database.
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"             # 5433 on host (5432 taken by Colima SSH tunnel)
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-clearmoney}"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
