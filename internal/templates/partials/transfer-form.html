<!--
=============================================================================
  TRANSFER FORM PARTIAL -- Dynamic HTMX Endpoint Switching
=============================================================================

  This form demonstrates an advanced HTMX pattern: dynamically changing
  the hx-post URL based on user interaction (InstaPay toggle).

  HTMX FORM SUBMISSION:
    <form hx-post="/transactions/transfer"
          hx-target="#transfer-result"
          hx-swap="innerHTML">

    hx-post="/transactions/transfer"
      Submits the form data via AJAX POST. On success, the server returns
      an HTML fragment (success message) that replaces #transfer-result.

    DYNAMIC ENDPOINT SWITCHING (via JavaScript):
      When the user toggles "InstaPay", JavaScript changes the hx-post attribute:
        form.setAttribute('hx-post', '/transactions/instapay-transfer');
        htmx.process(form);  // <-- IMPORTANT: tells HTMX to re-read attributes

      htmx.process(element) is required after programmatically changing hx-*
      attributes. Without it, HTMX would still use the old URL.
      Docs: https://htmx.org/api/#process

      Blade/Livewire: Livewire handles this server-side with wire:model
      Django: You'd typically use a hidden input or JS to set the action URL

  TAILWIND TOGGLE SWITCH PATTERN:
    <input type="checkbox" class="sr-only peer">
    <div class="peer-checked:bg-teal-600 after:translate-x-full ...">

    sr-only     = visually hidden but accessible to screen readers
    peer        = enables peer-checked: modifiers on siblings
    after:*     = styles the ::after pseudo-element (the toggle knob)
    peer-checked:after:translate-x-full = slides the knob right when checked

    This creates a mobile-style toggle switch with ZERO JavaScript for the
    visual effect. Only the InstaPay fee logic needs JavaScript.

  RANGE REUSE:
    Both "From Account" and "To Account" dropdowns use `range .Accounts`.
    The same slice is iterated twice to populate both selects. Go templates
    support iterating the same slice multiple times without issues.

    `string .Currency` -- converts the Currency type to a string for display.
    Go's typed enums need explicit conversion in templates.

  Docs: https://htmx.org/attributes/hx-post/
        https://htmx.org/api/#process
        https://tailwindcss.com/docs/hover-focus-and-other-states#styling-based-on-sibling-state
=============================================================================
-->
{{define "transfer-form"}}
<div class="bg-white rounded-2xl shadow-sm p-5 space-y-4">
    <h2 class="text-base font-bold text-slate-800">Transfer Between Accounts</h2>
    <form hx-post="/transactions/transfer" hx-target="#transfer-result" hx-swap="innerHTML"
          class="space-y-3" id="transfer-form">
        <div>
            <label class="block text-xs text-gray-500 mb-1">From Account</label>
            <select name="source_account_id" required
                    class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm">
                <option value="">Select source...</option>
                {{range .Accounts}}
                <option value="{{.ID}}">{{.Name}} ({{string .Currency}})</option>
                {{end}}
            </select>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">To Account</label>
            <select name="dest_account_id" required
                    class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm">
                <option value="">Select destination...</option>
                {{range .Accounts}}
                <option value="{{.ID}}">{{.Name}} ({{string .Currency}})</option>
                {{end}}
            </select>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Amount</label>
            <input type="number" name="amount" step="0.01" min="0.01" required
                   id="transfer-amount"
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm">
        </div>

        <!-- InstaPay toggle -->
        <div class="flex items-center justify-between py-1">
            <label class="text-sm text-slate-700 font-medium" for="instapay-toggle">InstaPay</label>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" name="instapay" id="instapay-toggle" class="sr-only peer"
                       onchange="toggleInstapay()">
                <div class="w-9 h-5 bg-gray-200 rounded-full peer-checked:bg-teal-600 transition-colors
                            after:content-[''] after:absolute after:top-[2px] after:left-[2px]
                            after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all
                            peer-checked:after:translate-x-full"></div>
            </label>
        </div>

        <!-- Fee display (shown when InstaPay is active) -->
        <div id="instapay-fee" class="hidden bg-amber-50 border border-amber-200 rounded-lg p-2 text-xs text-amber-700">
            InstaPay fee: <span id="instapay-fee-amount" class="font-semibold">EGP 0.00</span>
            <span class="text-amber-500">(0.1%, min 0.5, max 20 EGP)</span>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Note (optional)</label>
            <input type="text" name="note"
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm">
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Date</label>
            <input type="date" name="date"
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm">
        </div>

        <button type="submit"
                class="w-full bg-teal-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-teal-700">
            Transfer
        </button>
    </form>
    <div id="transfer-result"></div>
</div>

<script>
function toggleInstapay() {
    var feeDiv = document.getElementById('instapay-fee');
    var toggle = document.getElementById('instapay-toggle');
    var form = document.getElementById('transfer-form');

    if (toggle.checked) {
        feeDiv.classList.remove('hidden');
        form.setAttribute('hx-post', '/transactions/instapay-transfer');
        htmx.process(form);
        updateFee();
    } else {
        feeDiv.classList.add('hidden');
        form.setAttribute('hx-post', '/transactions/transfer');
        htmx.process(form);
    }
}

function updateFee() {
    var amount = parseFloat(document.getElementById('transfer-amount').value) || 0;
    var fee = Math.max(0.5, Math.min(amount * 0.001, 20));
    if (amount <= 0) fee = 0;
    document.getElementById('instapay-fee-amount').textContent = 'EGP ' + fee.toFixed(2);
}

document.getElementById('transfer-amount').addEventListener('input', function() {
    if (document.getElementById('instapay-toggle').checked) {
        updateFee();
    }
});
</script>
{{end}}
