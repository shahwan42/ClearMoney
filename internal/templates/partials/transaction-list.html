<!--
=============================================================================
  TRANSACTION LIST PARTIAL -- Paginated List with HTMX "Load More"
=============================================================================

  HTMX PAGINATION PATTERN ("Load More" button):

    <button hx-get="/transactions/list?offset=20&..."
            hx-target="#transaction-list"
            hx-swap="innerHTML">
      Load more...
    </button>

    hx-get="/transactions/list?offset=`.NextOffset`&..."
      Fetches the next page of transactions. The offset and all current filter
      values are included in the URL so the server knows where to continue.
      The server returns THIS SAME TEMPLATE with the next batch of transactions.

    hx-target="#transaction-list"
      Replaces the entire transaction list container (defined in transactions.html).

    hx-swap="innerHTML"
      Replaces the inner content of the target. This means the new response
      includes ALL transactions (previous + new), not just the new batch.
      An alternative approach is hx-swap="beforeend" to append only new items,
      but replacing everything is simpler and avoids duplicate issues.
      Docs: https://htmx.org/attributes/hx-swap/

    Blade/Livewire: Livewire's wire:click="loadMore" with $this->offset
    Django: Paginator with django-htmx returning a partial

  GO TEMPLATE STRING INTERPOLATION IN ATTRIBUTES:
    hx-get="/transactions/list?offset=`.NextOffset`&type=`.Type`"

    Go template expressions inside HTML attributes work the same as anywhere else.
    The Go template engine auto-escapes values for HTML safety (XSS prevention).
    This is similar to:
      Blade:  hx-get="/transactions/list?offset=` $nextOffset `"
      Jinja2: hx-get="/transactions/list?offset=` next_offset `"

  SUB-TEMPLATE FOR EACH ROW:
    `template "transaction-row" .`
    Each transaction is rendered by a separate "transaction-row" template.
    This promotes reuse -- the same row template can be used in different
    list contexts (main list, search results, recent transactions).

  Docs: https://htmx.org/examples/click-to-load/
=============================================================================
-->
{{define "transaction-list"}}
{{if .Transactions}}
<div class="space-y-2">
    {{range .Transactions}}
    {{template "transaction-row" .}}
    {{end}}
</div>
{{if .HasMore}}
<div class="text-center mt-4">
    <button hx-get="/transactions/list?offset={{.NextOffset}}&account_id={{.AccountID}}&type={{.Type}}&category_id={{.CategoryID}}&date_from={{.DateFrom}}&date_to={{.DateTo}}&search={{.Search}}"
            hx-target="#transaction-list" hx-swap="innerHTML"
            class="text-sm text-teal-600 font-medium py-2">
        Load more...
    </button>
</div>
{{end}}
{{else}}
<div class="text-center py-12 text-gray-400">
    <p class="text-sm">No transactions found</p>
</div>
{{end}}
{{end}}
