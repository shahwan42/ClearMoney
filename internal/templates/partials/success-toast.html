{{define "success-toast"}}
<!-- Inline success message for the quick-entry sheet.
     Animated checkmark (TASK-077) + dashboard feed refresh via HTMX OOB swap. -->
<div class="bg-teal-50 border border-teal-200 rounded-xl p-4 text-center space-y-2 animate-toast">
    <div class="animate-success inline-block">
        <svg class="w-10 h-10 mx-auto text-teal-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" class="opacity-20" fill="currentColor" stroke="none"/>
            <path d="M7 13l3 3 7-7" class="animate-checkmark" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <p class="text-teal-800 font-semibold text-sm">Saved!</p>
    <p class="text-xs text-teal-600">
        New balance: <span class="font-bold">{{formatCurrency .NewBalance .Currency}}</span>
    </p>
    <button type="button" onclick="closeQuickEntry()"
        class="mt-2 px-4 py-1.5 bg-teal-600 text-white rounded-lg text-sm font-medium hover:bg-teal-700">
        Done
    </button>
</div>
<!-- Refresh dashboard recent transactions via HTMX out-of-band swap -->
<div id="recent-transactions" hx-get="/partials/recent-transactions" hx-trigger="load" hx-swap-oob="true"></div>
{{end}}
