{{define "chart-sparkline-dual"}}
<!-- Dual sparkline — two lines in separate vertical bands on the same SVG.
     Data shape: {Values1 []float64, Color1 string, Values2 []float64, Color2 string, Width int, Height int}
     Each line is normalized independently and placed in its own half of the chart. -->
{{if .Values1}}
<svg class="chart-sparkline" width="{{or .Width 120}}" height="{{or .Height 40}}" viewBox="0 0 100 40" preserveAspectRatio="none">
    <!-- Primary line (top half) -->
    <g transform="{{if .Values2}}scale(1,0.45){{end}}">
        <polygon points="0,40 {{sparklinePoints .Values1}} 100,40" fill="{{or .Color1 "#0d9488"}}" opacity="0.08" />
        <polyline points="{{sparklinePoints .Values1}}" stroke="{{or .Color1 "#0d9488"}}" />
    </g>
    {{if .Values2}}
    <!-- Secondary line (bottom half) -->
    <g transform="translate(0,22) scale(1,0.45)">
        <polygon points="0,40 {{sparklinePoints .Values2}} 100,40" fill="{{or .Color2 "#3b82f6"}}" opacity="0.08" />
        <polyline points="{{sparklinePoints .Values2}}" stroke="{{or .Color2 "#3b82f6"}}" />
    </g>
    {{end}}
</svg>
{{end}}
{{end}}
