<!--
=============================================================================
  QUICK ENTRY PARTIAL -- Smart Category Suggestion via HTMX & Fetch
=============================================================================

  This partial is LAZY-LOADED into the bottom sheet via HTMX.
  It is NOT rendered on initial page load -- it's fetched on demand:
    Bottom-nav: hx-get="/transactions/quick-form" hx-trigger="open-quick-entry"
    Server returns THIS template as an HTML fragment.

  Blade equivalent: A Livewire component loaded via wire:init
  Django equivalent: A view that returns render(request, 'partials/quick-entry.html')

  HTMX FORM SUBMISSION (same pattern as transaction-new.html):
    hx-post="/transactions/quick"     -- AJAX POST to create transaction
    hx-target="#quick-entry-result"   -- success/error message goes here
    hx-swap="innerHTML"               -- replace target's content

  SMART DEFAULTS (server-side):
    The Go handler pre-populates data for a faster entry experience:
    - .LastAccountID: the most recently used account (pre-selected in dropdown)
    - .AutoCategoryID: if the same category was used 3+ times consecutively,
      it's auto-selected (habit detection)
    - .ExpenseCategories / .IncomeCategories: split by type for toggling

  TEMPLATE VARIABLE + RANGE PATTERN:
    `$lastAcct := .LastAccountID`
    `range .Accounts`
      <option value="`.ID`" `if eq .ID $lastAcct`selected`end`>
    `end`

    The $lastAcct variable is declared BEFORE the range loop because
    dot (.) changes inside `range`. Without $lastAcct, we'd lose access
    to the outer .LastAccountID. Alternative: use $.LastAccountID ($ = root).

  SMART CATEGORY SUGGESTION (JavaScript + REST API):
    The <script> section at the bottom uses a fetch() call (not HTMX) to
    GET /api/transactions/suggest-category?note=... and auto-fill the category.
    This is a case where vanilla JS is simpler than HTMX because we need
    to set a <select> value programmatically, not swap HTML.

    You COULD do this with HTMX using hx-get on the note input with
    hx-trigger="keyup changed delay:300ms", but you'd need the server
    to return the entire <select> element, which is more complex.

  Docs: https://htmx.org/attributes/hx-post/
        https://htmx.org/examples/lazy-loading/
=============================================================================
-->
{{define "quick-entry-form"}}
<!-- Quick-entry form -- loaded into the bottom sheet via HTMX.
     Streamlined version of the full transaction form, optimised for speed.
     Uses smart defaults: pre-selects last-used account, auto-selects category
     if used 3+ times consecutively. -->
<h3 class="text-lg font-bold text-slate-800 mb-4">Quick Entry</h3>

<!-- Result area for success/error messages -->
<div id="quick-entry-result"></div>

<form
    hx-post="/transactions/quick"
    hx-target="#quick-entry-result"
    hx-swap="innerHTML"
    class="space-y-4"
    id="quick-entry-form"
>
    <!-- Type selector (TASK-082: enlarged touch targets, min 44px) -->
    <div class="flex gap-2">
        <label class="flex-1">
            <input type="radio" name="type" value="expense" checked class="peer hidden">
            <div class="peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-700 border-2 border-gray-200 rounded-xl py-3 min-h-[44px] text-center text-sm font-medium cursor-pointer transition-all flex items-center justify-center">
                Expense
            </div>
        </label>
        <label class="flex-1">
            <input type="radio" name="type" value="income" class="peer hidden">
            <div class="peer-checked:bg-teal-50 peer-checked:border-teal-400 peer-checked:text-teal-700 border-2 border-gray-200 rounded-xl py-3 min-h-[44px] text-center text-sm font-medium cursor-pointer transition-all flex items-center justify-center">
                Income
            </div>
        </label>
    </div>

    <!-- Amount -->
    <div>
        <input type="number" name="amount" step="0.01" min="0.01" required autofocus
            placeholder="0.00"
            class="w-full text-3xl font-bold text-center border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-teal-500"
            inputmode="decimal">
    </div>

    <!-- Account (pre-selects last-used account via smart defaults) -->
    <div>
        <select name="account_id" required
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
            id="qe-account-select">
            <option value="">Select account...</option>
            {{$lastAcct := .LastAccountID}}
            {{range .Accounts}}
            <option value="{{.ID}}" {{if eq .ID $lastAcct}}selected{{end}}>{{.Name}} ({{.Currency}})</option>
            {{end}}
        </select>
    </div>

    <!-- Hidden currency (derived from account) -->
    <input type="hidden" name="currency" value="EGP" id="qe-currency-input">

    <!-- Category (auto-selects if same category used 3+ times consecutively) -->
    <div>
        {{$autoCat := .AutoCategoryID}}
        <select name="category_id"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
            id="qe-category-select">
            <option value="">No category</option>
            <optgroup label="Expense" class="qe-category-expense">
            {{range .ExpenseCategories}}
            <option value="{{.ID}}" {{if eq .ID $autoCat}}selected{{end}}>{{if .Icon}}{{deref .Icon}} {{end}}{{.Name}}</option>
            {{end}}
            </optgroup>
            <optgroup label="Income" class="qe-category-income" style="display:none">
            {{range .IncomeCategories}}
            <option value="{{.ID}}">{{if .Icon}}{{deref .Icon}} {{end}}{{.Name}}</option>
            {{end}}
            </optgroup>
        </select>
    </div>

    <!-- Date (defaults to today via JS) -->
    <input type="hidden" name="date" id="qe-date-input">

    <!-- Optional note -->
    <div>
        <input type="text" name="note" placeholder="Note (optional)"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- Virtual account (optional envelope allocation) -->
    {{if .VirtualAccounts}}
    <div>
        <select name="virtual_account_id" id="qe-va-select"
            class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            <option value="">Virtual Account (optional)</option>
            {{range .VirtualAccounts}}
            <option value="{{.ID}}" data-account-id="{{if .AccountID}}{{deref .AccountID}}{{end}}">{{.Icon}} {{.Name}}</option>
            {{end}}
        </select>
    </div>
    {{end}}

    <!-- Submit (TASK-082: min 44px touch target) -->
    <button type="submit"
        class="w-full bg-teal-600 text-white py-3 min-h-[44px] rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all active:animate-bounce">
        Save
    </button>
</form>

<script>
(function() {
    // Set date to today
    document.getElementById('qe-date-input').value = new Date().toISOString().split('T')[0];

    // Set currency from pre-selected account
    var acctSelect = document.getElementById('qe-account-select');
    if (acctSelect && acctSelect.value) {
        var sel = acctSelect.options[acctSelect.selectedIndex];
        if (sel && sel.text.includes('USD')) {
            document.getElementById('qe-currency-input').value = 'USD';
        }
    }

    // Switch categories on type change
    document.querySelectorAll('#quick-entry-form input[name="type"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            var isExpense = this.value === 'expense';
            document.querySelector('optgroup.qe-category-expense').style.display = isExpense ? '' : 'none';
            document.querySelector('optgroup.qe-category-income').style.display = isExpense ? 'none' : '';
            document.getElementById('qe-category-select').value = '';
        });
    });

    // Update currency from account selection + filter virtual accounts
    if (acctSelect) {
        acctSelect.addEventListener('change', function() {
            var sel = this.options[this.selectedIndex];
            document.getElementById('qe-currency-input').value = (sel && sel.text.includes('USD')) ? 'USD' : 'EGP';
            filterQeVirtualAccounts();
        });
    }

    // Filter virtual accounts by selected bank account
    function filterQeVirtualAccounts() {
        var vaSelect = document.getElementById('qe-va-select');
        if (!acctSelect || !vaSelect) return;
        var selectedAcct = acctSelect.value;
        vaSelect.querySelectorAll('option').forEach(function(opt) {
            if (!opt.value) return;
            var vaAcctId = opt.getAttribute('data-account-id');
            var hide = vaAcctId && vaAcctId !== selectedAcct;
            opt.hidden = hide;
            opt.disabled = hide;
        });
        if (vaSelect.selectedOptions[0] && vaSelect.selectedOptions[0].hidden) {
            vaSelect.value = '';
        }
    }
    filterQeVirtualAccounts();

    // TASK-079: Smart category suggestion based on note keywords
    var noteInput = document.querySelector('#quick-entry-form input[name="note"]');
    var suggestTimer = null;
    if (noteInput) {
        noteInput.addEventListener('input', function() {
            clearTimeout(suggestTimer);
            var val = this.value.trim();
            if (val.length < 3) return;
            suggestTimer = setTimeout(function() {
                fetch('/api/transactions/suggest-category?note=' + encodeURIComponent(val))
                    .then(function(r) { return r.ok ? r.text() : ''; })
                    .then(function(catId) {
                        if (catId) {
                            var sel = document.getElementById('qe-category-select');
                            if (sel && !sel.value) { sel.value = catId; }
                        }
                    }).catch(function() {});
            }, 300);
        });
    }
})();
</script>
{{end}}
