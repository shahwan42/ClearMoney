{{define "account-edit-form"}}
<form
    hx-post="/accounts/{{.Account.ID}}/edit"
    hx-target="#edit-account-result"
    hx-swap="innerHTML"
    class="space-y-3"
>
    <div id="edit-account-result"></div>

    <div>
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Account Name</label>
        <input type="text" name="name" required value="{{.Account.Name}}"
            class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Type</label>
            <select name="type" id="edit-account-type-select"
                onchange="document.getElementById('edit-credit-limit-field').style.display = (this.value === 'credit_card' || this.value === 'credit_limit') ? 'block' : 'none'"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="current" {{if eq (string .Account.Type) "current"}}selected{{end}}>Current</option>
                <option value="savings" {{if eq (string .Account.Type) "savings"}}selected{{end}}>Savings</option>
                <option value="prepaid" {{if eq (string .Account.Type) "prepaid"}}selected{{end}}>Prepaid</option>
                <option value="cash" {{if eq (string .Account.Type) "cash"}}selected{{end}}>Cash</option>
                <option value="credit_card" {{if eq (string .Account.Type) "credit_card"}}selected{{end}}>Credit Card</option>
                <option value="credit_limit" {{if eq (string .Account.Type) "credit_limit"}}selected{{end}}>Credit Limit</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Currency</label>
            <select name="currency"
                class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="EGP" {{if eq (string .Account.Currency) "EGP"}}selected{{end}}>EGP</option>
                <option value="USD" {{if eq (string .Account.Currency) "USD"}}selected{{end}}>USD</option>
            </select>
        </div>
    </div>

    <div id="edit-credit-limit-field" style="{{if .Account.IsCreditType}}display: block;{{else}}display: none;{{end}}">
        <label class="block text-xs text-gray-500 dark:text-slate-400 mb-1">Credit Limit</label>
        <input type="number" name="credit_limit" step="0.01" placeholder="e.g., 500000"
            {{if .Account.CreditLimit}}value="{{derefFloat .Account.CreditLimit}}"{{end}}
            class="w-full border border-gray-300 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <div class="flex gap-2 pt-1">
        <button type="submit"
            class="flex-1 bg-teal-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all">
            Update
        </button>
        <button type="button"
            onclick="closeEditAccount()"
            class="px-4 py-2.5 text-sm text-gray-500 dark:text-slate-400 hover:text-gray-700 dark:hover:text-slate-200">
            Cancel
        </button>
    </div>
</form>
{{end}}
