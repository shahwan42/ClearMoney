{{define "transaction-edit-form"}}
<div class="bg-white rounded-xl shadow-sm p-4 space-y-3" id="tx-{{.Transaction.ID}}">
    <form hx-put="/transactions/{{.Transaction.ID}}" hx-target="#tx-{{.Transaction.ID}}" hx-swap="outerHTML" class="space-y-3">
        <div class="grid grid-cols-2 gap-2">
            <select name="type" class="text-sm border border-gray-200 rounded-lg px-2 py-1.5">
                <option value="expense" {{if eq (string .Transaction.Type) "expense"}}selected{{end}}>Expense</option>
                <option value="income" {{if eq (string .Transaction.Type) "income"}}selected{{end}}>Income</option>
            </select>
            <input type="number" name="amount" value="{{printf "%.2f" .Transaction.Amount}}" step="0.01" min="0.01"
                   class="text-sm border border-gray-200 rounded-lg px-2 py-1.5" required>
        </div>

        <select name="category_id" class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">
            <option value="">No category</option>
            <optgroup label="Expense">
                {{range .Categories}}{{if eq .Type "expense"}}
                <option value="{{.ID}}" {{if eq .ID $.SelectedCategoryID}}selected{{end}}>{{if .Icon}}{{deref .Icon}} {{end}}{{.Name}}</option>
                {{end}}{{end}}
            </optgroup>
            <optgroup label="Income">
                {{range .Categories}}{{if eq .Type "income"}}
                <option value="{{.ID}}" {{if eq .ID $.SelectedCategoryID}}selected{{end}}>{{if .Icon}}{{deref .Icon}} {{end}}{{.Name}}</option>
                {{end}}{{end}}
            </optgroup>
        </select>

        <input type="text" name="note" value="{{if .Transaction.Note}}{{deref .Transaction.Note}}{{end}}"
               placeholder="Note (optional)"
               class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">

        <input type="date" name="date" value="{{.Transaction.Date.Format "2006-01-02"}}"
               class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">

        {{if .VirtualAccounts}}
        <select name="virtual_account_id" class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">
            <option value="">No virtual account</option>
            {{range .VirtualAccounts}}
            <option value="{{.ID}}" data-account-id="{{if .AccountID}}{{deref .AccountID}}{{end}}" {{if eq .ID $.SelectedVirtualAccountID}}selected{{end}}>{{.Icon}} {{.Name}}</option>
            {{end}}
        </select>
        {{end}}

        <input type="hidden" name="currency" value="{{.Transaction.Currency}}">
        <input type="hidden" name="account_id" value="{{.Transaction.AccountID}}">

        <div class="flex gap-2">
            <button type="submit"
                    class="flex-1 bg-teal-600 text-white text-sm py-2 rounded-lg font-medium hover:bg-teal-700">
                Save
            </button>
            <button type="button"
                    hx-get="/transactions/row/{{.Transaction.ID}}" hx-target="#tx-{{.Transaction.ID}}" hx-swap="outerHTML"
                    class="flex-1 bg-gray-100 text-gray-600 text-sm py-2 rounded-lg font-medium hover:bg-gray-200">
                Cancel
            </button>
        </div>
    </form>
</div>
{{end}}
