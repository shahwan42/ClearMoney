{{define "due-date-warning"}}
{{if .}}
{{range .}}
<div class="bg-red-50 border border-red-200 rounded-xl p-3 flex items-center gap-3">
    <div class="w-8 h-8 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
    </div>
    <div class="flex-1">
        <p class="text-sm font-medium text-red-800">{{.AccountName}} due in {{.DaysUntilDue}} days</p>
        <p class="text-xs text-red-600">Due {{formatDate .DueDate}} &middot; Balance: {{formatEGP .Balance}}</p>
    </div>
</div>
{{end}}
{{end}}
{{end}}
