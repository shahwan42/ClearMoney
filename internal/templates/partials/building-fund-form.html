{{define "building-fund-form"}}
<div class="bg-white rounded-2xl shadow-sm p-5 space-y-3">
    <form hx-post="/building-fund/add" hx-target="#building-fund-result" hx-swap="innerHTML" class="space-y-3">
        <div class="flex gap-2">
            <label class="flex-1">
                <input type="radio" name="type" value="income" class="sr-only peer" checked>
                <div class="text-center py-2 rounded-lg border border-gray-200 text-sm cursor-pointer
                            peer-checked:bg-green-50 peer-checked:border-green-300 peer-checked:text-green-700">
                    Collection
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="type" value="expense" class="sr-only peer">
                <div class="text-center py-2 rounded-lg border border-gray-200 text-sm cursor-pointer
                            peer-checked:bg-red-50 peer-checked:border-red-300 peer-checked:text-red-700">
                    Expense
                </div>
            </label>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Amount</label>
            <input type="number" name="amount" step="0.01" min="0.01" required
                   placeholder="0.00" inputmode="decimal"
                   class="w-full text-xl font-bold text-center border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-amber-500">
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Account</label>
            <select name="account_id" required class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
                {{range .Accounts}}
                <option value="{{.ID}}">{{.Name}} ({{.Currency}})</option>
                {{end}}
            </select>
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Date</label>
            <input type="date" name="date" class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Note (optional)</label>
            <input type="text" name="note" placeholder="e.g., Monthly collection"
                   class="w-full border border-gray-200 rounded-lg px-3 py-2.5 text-sm">
        </div>

        <button type="submit"
                class="w-full bg-amber-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-amber-700">
            Record
        </button>
    </form>

    <div id="building-fund-result"></div>
</div>
{{end}}
