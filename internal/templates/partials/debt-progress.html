{{define "debt-progress"}}
<!-- Debt payoff progress bar and projected payoff date.
     Receives a service.DebtSummary struct.
     - Green bar shows % of total debt repaid
     - Projected payoff shown if at least 2 repayments have been made -->
<div>
    <div class="flex justify-between text-sm mb-1">
        <span class="text-slate-600">{{printf "%.0f" .ProgressPct}}% repaid</span>
        <span class="text-xs text-gray-400">{{formatEGP .TotalRepaid}} of {{formatEGP (addFloat .TotalLent .TotalBorrowed)}}</span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-3">
        <div class="h-3 rounded-full transition-all {{if ge .ProgressPct 100.0}}bg-emerald-500{{else if ge .ProgressPct 50.0}}bg-teal-500{{else}}bg-amber-500{{end}}"
             style="width: {{if gt .ProgressPct 100.0}}100{{else}}{{printf "%.0f" .ProgressPct}}{{end}}%"></div>
    </div>
    {{if not .ProjectedPayoff.IsZero}}
    <p class="text-xs text-gray-500 mt-2">
        Projected payoff: <span class="font-medium text-slate-700">{{.ProjectedPayoff.Format "Jan 2, 2006"}}</span>
    </p>
    {{end}}
</div>
{{end}}
