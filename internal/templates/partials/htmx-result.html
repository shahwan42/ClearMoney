{{define "htmx-result"}}
<div class="{{if eq .Type "error"}}bg-red-50 text-red-700{{else if eq .Type "success"}}bg-green-50 text-green-700{{else}}bg-teal-50 border border-teal-200 text-teal-800{{end}} p-3 rounded-lg text-sm">
    <p class="font-medium">{{.Message}}</p>
    {{if .Detail}}<p class="text-xs mt-1 {{if eq .Type "error"}}text-red-600{{else}}text-gray-600{{end}}">{{.Detail}}</p>{{end}}
</div>
{{end}}
