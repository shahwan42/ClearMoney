{{define "account-form"}}
<!-- Form for adding a new account under an institution. HTMX-powered.
     Targets #account-form-area (its own container). On success, the handler returns
     a success toast + OOB swap to refresh #institution-list. On error, it returns
     an error banner + the form re-rendered so the user can fix and retry. -->
<form
    hx-post="/accounts/add"
    hx-target="#account-form-area"
    hx-swap="innerHTML"
    class="bg-white rounded-xl shadow-sm p-4 space-y-3"
>
    <h3 class="font-semibold text-slate-800 text-sm">
        Add Account
        {{if .InstitutionName}}
            <span class="text-gray-400 font-normal">to {{.InstitutionName}}</span>
        {{end}}
    </h3>

    <input type="hidden" name="institution_id" value="{{.InstitutionID}}">
    <input type="hidden" name="institution_name_display" value="{{.InstitutionName}}">

    <div>
        <label class="block text-xs text-gray-500 mb-1">Account Name</label>
        <input type="text" name="name" required placeholder="e.g., Current, Savings, Credit Card"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Type</label>
            <select name="type" id="account-type-select"
                onchange="document.getElementById('credit-limit-field').style.display = (this.value === 'credit_card' || this.value === 'credit_limit') ? 'block' : 'none'"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="current">Current</option>
                <option value="savings">Savings</option>
                <option value="prepaid">Prepaid</option>
                <option value="credit_card">Credit Card</option>
                <option value="credit_limit">Credit Limit</option>
            </select>
        </div>
        <div>
            <label class="block text-xs text-gray-500 mb-1">Currency</label>
            <select name="currency"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="EGP">EGP</option>
                <option value="USD">USD</option>
            </select>
        </div>
    </div>

    <div>
        <label class="block text-xs text-gray-500 mb-1">Initial Balance</label>
        <input type="number" name="initial_balance" step="0.01" value="0"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <!-- Credit limit field — only shown for credit card / credit limit account types -->
    <div id="credit-limit-field" style="display: none;">
        <label class="block text-xs text-gray-500 mb-1">Credit Limit</label>
        <input type="number" name="credit_limit" step="0.01" placeholder="e.g., 500000"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <div class="flex gap-2">
        <button type="submit"
            class="flex-1 bg-teal-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all">
            Add Account
        </button>
        <button type="button"
            onclick="document.getElementById('account-form-area').innerHTML = ''"
            class="px-4 py-2 text-sm text-gray-500 hover:text-gray-700">
            Cancel
        </button>
    </div>
</form>
{{end}}
