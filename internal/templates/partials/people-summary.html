{{define "people-summary"}}
<div class="bg-white rounded-xl shadow-sm p-4" id="people-summary">
    <div class="flex items-center justify-between mb-2">
        <h3 class="text-xs font-medium text-gray-500 uppercase tracking-wide">People</h3>
        <a href="/people" class="text-xs text-teal-600 hover:text-teal-700">Manage</a>
    </div>
    <div class="flex justify-between">
        <div>
            <p class="text-xs text-gray-400">Owed to me</p>
            <p class="text-sm font-semibold text-green-600">{{formatEGP .PeopleOwedToMe}}</p>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400">I owe</p>
            <p class="text-sm font-semibold text-red-600">{{formatEGP .PeopleIOwe}}</p>
        </div>
    </div>
</div>
{{end}}
