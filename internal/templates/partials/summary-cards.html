{{define "summary-cards"}}
<section class="grid grid-cols-2 gap-3" id="summary-cards">
    <div class="bg-white rounded-xl shadow-sm p-3">
        <p class="text-xs text-gray-500">Liquid Cash</p>
        <p class="text-lg font-semibold text-teal-700">{{formatEGP .CashTotal}}</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-3">
        <p class="text-xs text-gray-500">Credit Used</p>
        <p class="text-lg font-semibold {{if lt .CreditUsed 0.0}}text-red-600{{else}}text-slate-800{{end}}">
            {{formatEGP (neg .CreditUsed)}}
        </p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-3">
        <p class="text-xs text-gray-500">Credit Available</p>
        <p class="text-lg font-semibold text-blue-600">{{formatEGP .CreditAvail}}</p>
    </div>
    <div class="bg-white rounded-xl shadow-sm p-3">
        <p class="text-xs text-gray-500">Debt</p>
        <p class="text-lg font-semibold text-slate-800">{{formatEGP .DebtTotal}}</p>
    </div>
</section>
{{end}}
