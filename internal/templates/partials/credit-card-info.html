{{define "credit-card-info"}}
{{if .}}
<div class="bg-blue-50 rounded-xl p-4 space-y-2">
    <h3 class="text-xs font-medium text-blue-700 uppercase tracking-wide">Billing Cycle</h3>

    <div class="flex justify-between text-sm">
        <span class="text-blue-600">Statement closes</span>
        <span class="font-medium text-blue-800">Day {{.StatementDay}}</span>
    </div>

    <div class="flex justify-between text-sm">
        <span class="text-blue-600">Current period</span>
        <span class="font-medium text-blue-800">{{formatDateShort .PeriodStart}} - {{formatDateShort .PeriodEnd}}</span>
    </div>

    <div class="flex justify-between text-sm">
        <span class="text-blue-600">Due date</span>
        <span class="font-medium {{if .IsDueSoon}}text-red-600{{else}}text-blue-800{{end}}">
            {{formatDate .DueDate}}
            {{if .IsDueSoon}}
            <span class="ml-1 text-xs bg-red-100 text-red-700 rounded-full px-2 py-0.5">{{.DaysUntilDue}} days</span>
            {{end}}
        </span>
    </div>
</div>
{{end}}
{{end}}
