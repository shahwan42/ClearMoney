{{define "chart-donut"}}
<!-- Donut Chart — renders a conic-gradient circle with a center hole.
     Data shape: {Segments []ChartSegment, CenterLabel string, CenterSub string, Small bool}
     Like @component('chart-donut', ...) in Laravel Blade. -->
<div class="chart-donut-wrap">
    <div class="chart-donut{{if .Small}} chart-donut-sm{{end}}" style="background: {{conicGradient .Segments}}">
        <div class="chart-donut-hole">
            {{if .CenterLabel}}<span class="chart-donut-value">{{.CenterLabel}}</span>{{end}}
            {{if .CenterSub}}<span class="chart-donut-sublabel">{{.CenterSub}}</span>{{end}}
        </div>
    </div>
</div>
{{end}}
