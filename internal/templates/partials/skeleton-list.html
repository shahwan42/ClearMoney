{{define "skeleton-list"}}

     Shows animated shimmer rows while HTMX fetches real transactions.
     Renders 3 placeholder rows that mimic the transaction row layout. -->
<div class="space-y-3">
    {{range (slice (slice "a" "b" "c") 0 3)}}
    <div class="flex items-center justify-between py-2">
        <div class="space-y-2">
            <div class="skeleton h-4 w-32"></div>
            <div class="skeleton h-3 w-20"></div>
        </div>
        <div class="skeleton h-5 w-16"></div>
    </div>
    {{end}}
</div>
{{end}}
