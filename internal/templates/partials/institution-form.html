{{define "institution-form"}}
<!-- Form for adding a new institution. Submitted via HTMX to avoid full page reload. -->
<form
    hx-post="/api/institutions"
    hx-target="#institution-list"
    hx-swap="innerHTML"
    hx-on::after-request="if(event.detail.successful) this.reset()"
    class="bg-white rounded-xl shadow-sm p-4 space-y-3"
>
    <h3 class="font-semibold text-slate-800 text-sm">Add Institution</h3>

    <div>
        <label class="block text-xs text-gray-500 mb-1">Name</label>
        <input type="text" name="name" required placeholder="e.g., HSBC, CIB, Telda"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
    </div>

    <div>
        <label class="block text-xs text-gray-500 mb-1">Type</label>
        <select name="type"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            <option value="bank">Bank</option>
            <option value="fintech">Fintech</option>
        </select>
    </div>

    <button type="submit"
        class="w-full bg-teal-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all">
        Add Institution
    </button>
</form>
{{end}}
