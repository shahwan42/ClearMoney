{{define "institution-form"}}
<!-- Form for adding a new institution. Rendered inside the create bottom sheet.
     Submitted via HTMX to /institutions/add. On success, handler returns a toast,
     closes the sheet, and OOB-refreshes #institution-list. On error, re-renders
     this form with an error message. -->
<div class="space-y-3">
    {{if .Error}}
    <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm">{{.Error}}</div>
    {{end}}

    <form hx-post="/institutions/add"
          hx-target="#create-sheet-content"
          hx-swap="innerHTML">

        <h3 class="font-semibold text-slate-800 text-sm mb-3">Add Institution</h3>

        <div class="space-y-3">
            <div>
                <label class="block text-xs text-gray-500 mb-1">Name</label>
                <input type="text" name="name" required placeholder="e.g., HSBC, CIB, Telda"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
            </div>

            <div>
                <label class="block text-xs text-gray-500 mb-1">Type</label>
                <select name="type"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <option value="bank">Bank</option>
                    <option value="fintech">Fintech</option>
                    <option value="wallet">Wallet</option>
                </select>
            </div>
        </div>

        <div class="flex gap-2 mt-4">
            <button type="submit"
                class="flex-1 bg-teal-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-teal-700 active:scale-[0.98] transition-all">
                Add Institution
            </button>
            <button type="button" onclick="closeCreateSheet()"
                class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg text-sm font-medium hover:bg-gray-200">
                Cancel
            </button>
        </div>
    </form>
</div>
{{end}}
