<!--
  BOTTOM NAVIGATION — Mobile Tab Bar with Active Tab Highlighting

  Fixed bottom nav with 4 tabs + FAB (Floating Action Button) for quick entry.

  ACTIVE TAB: Uses Go's "if eq" comparison to highlight the current tab.
    Blade:  @if($activeTab === 'home') ... @else ... @endif
    Jinja2: if active_tab == 'home' ... else ... endif
    "eq" is Go's template equality function. Others: ne, lt, gt, le, ge.

  DOT (.) DATA: .ActiveTab accesses the struct field from the handler.
    Like Blade's $activeTab or Jinja2's active_tab variable.

  HTMX: The quick-entry bottom sheet is lazy-loaded via hx-get when
    the + button fires a custom "open-quick-entry" event.
    See: https://htmx.org/attributes/hx-trigger/

  Tailwind: fixed bottom-0, h-16 (64px, matches pb-20 padding in main).
-->
{{define "bottom-nav"}}
<!-- Bottom navigation — fixed at the bottom like a native mobile app tab bar.
     Three tabs (Home, Reports, People) plus the FAB for quick entry. -->
<nav class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-slate-900 border-t border-gray-200 dark:border-slate-700 h-16 flex items-center justify-around px-4 safe-area-bottom">
    <a href="/" class="flex flex-col items-center gap-0.5 text-xs {{if eq .ActiveTab "home"}}text-teal-600{{else}}text-gray-500 hover:text-gray-700{{end}}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
        </svg>
        <span>Home</span>
    </a>

    <a href="/transactions" class="flex flex-col items-center gap-0.5 text-xs {{if eq .ActiveTab "transactions"}}text-teal-600{{else}}text-gray-500 hover:text-gray-700{{end}}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <span>History</span>
    </a>

    <!-- FAB — opens the quick-entry bottom sheet -->
    <button onclick="openQuickEntry()" class="fab-button flex items-center justify-center w-14 h-14 -mt-6 bg-teal-600 text-white rounded-full shadow-lg hover:bg-teal-700 active:scale-95 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
        </svg>
    </button>

    <a href="/accounts" class="flex flex-col items-center gap-0.5 text-xs {{if eq .ActiveTab "accounts"}}text-teal-600{{else}}text-gray-500 hover:text-gray-700{{end}}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
        </svg>
        <span>Accounts</span>
    </a>

    <a href="/people" class="flex flex-col items-center gap-0.5 text-xs {{if eq .ActiveTab "people"}}text-teal-600{{else}}text-gray-500 hover:text-gray-700{{end}}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        <span>People</span>
    </a>
</nav>

<!-- Quick-entry bottom sheet overlay -->
<div id="quick-entry-overlay" class="fixed inset-0 z-[60] bg-black/40 hidden" onclick="closeQuickEntry()"></div>

<!--
  HTMX LAZY-LOADED BOTTOM SHEET (uses shared BottomSheet module):
    The quick-entry.js file calls BottomSheet.open('quick-entry', {url: ...})
    which loads the form via HTMX and slides the sheet up.
    Tab buttons use hx-get to swap content within the sheet.
-->
<div id="quick-entry-sheet" class="fixed bottom-0 left-0 right-0 z-[70] bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl translate-y-full transition-transform duration-300 ease-out max-h-[85vh] overflow-y-auto"
     data-bottom-sheet="quick-entry">
    <!-- Drag handle -->
    <div id="quick-entry-handle" class="flex justify-center pt-3 pb-1 cursor-grab">
        <div class="w-10 h-1 bg-gray-300 dark:bg-slate-600 rounded-full"></div>
    </div>
    <!-- Tab bar for switching between Transaction, Exchange, and Transfer -->
    <div class="flex gap-2 px-4 mb-3" id="quick-entry-tabs">
        <button type="button"
            class="flex-1 py-2 text-sm font-medium text-center rounded-lg border bg-teal-50 text-teal-700 border-teal-200"
            id="tab-transaction"
            hx-get="/transactions/quick-form"
            hx-target="#quick-entry-content"
            hx-swap="innerHTML"
            onclick="setQuickEntryTab('transaction')">
            Transaction
        </button>
        <button type="button"
            class="flex-1 py-2 text-sm font-medium text-center rounded-lg border bg-gray-50 text-gray-500 border-gray-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-600"
            id="tab-exchange"
            hx-get="/exchange/quick-form"
            hx-target="#quick-entry-content"
            hx-swap="innerHTML"
            onclick="setQuickEntryTab('exchange')">
            Exchange
        </button>
        <button type="button"
            class="flex-1 py-2 text-sm font-medium text-center rounded-lg border bg-gray-50 text-gray-500 border-gray-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-600"
            id="tab-transfer"
            hx-get="/transactions/quick-transfer"
            hx-target="#quick-entry-content"
            hx-swap="innerHTML"
            onclick="setQuickEntryTab('transfer')">
            Transfer
        </button>
    </div>
    <div id="quick-entry-content" class="px-4 pb-6">
        <!-- Content loaded via HTMX when sheet opens -->
    </div>
</div>

<script src="/static/js/quick-entry.js"></script>
{{end}}
