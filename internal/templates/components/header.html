<!--
  HEADER COMPONENT — Reusable App Bar

  Defines a named template "header", included from the layout.
  Blade: resources/views/components/header.blade.php
  Jinja2: templates/components/header.html (via include)

  Go templates don't have props — components receive the full data context
  via dot (.). This file is parsed once at startup as part of the template set.

  Tailwind fixed header: pinned to top (fixed top-0), z-50, 56px tall (h-14).
  See: https://pkg.go.dev/html/template#hdr-Nested_template_definitions
-->
{{define "header"}}
<!-- Sticky header — stays visible as user scrolls, like a native app toolbar -->
<header class="fixed top-0 left-0 right-0 z-50 bg-slate-900 text-white h-14 flex items-center justify-between px-4 shadow-md">
    <a href="/" class="text-lg font-bold tracking-tight text-white no-underline">ClearMoney</a>
    <div class="flex items-center gap-3">
        <button id="theme-toggle" onclick="toggleTheme()" class="text-slate-300 hover:text-white text-sm" title="Toggle dark mode">🌙</button>
        <a href="/accounts" class="text-slate-300 hover:text-white" title="Accounts">
            <!-- Simple bank icon (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
        </a>
        <a href="/reports" class="text-slate-300 hover:text-white" title="Reports">
            <!-- Chart bar icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
        </a>
        <a href="/settings" class="text-slate-300 hover:text-white" title="Settings">
            <!-- Gear icon -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
        </a>
    </div>
</header>
{{end}}
