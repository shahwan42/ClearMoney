<!--
  BARE LAYOUT — Minimal Template for Auth Pages (login, setup, PIN entry)

  Stripped-down layout WITHOUT header, bottom-nav, HTMX, or PWA scripts.
  Blade: Like resources/views/layouts/auth.blade.php
  Jinja2: Like templates/layouts/bare.html

  The Go handler picks which template set to execute — auth handlers
  use "bare", authenticated pages use "base". No HTMX here because
  login uses standard form POST for proper cookie handling.
  Tailwind's flex centering puts the login card dead center.
-->
{{define "bare"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>{{block "title" .}}ClearMoney{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full flex flex-col items-center justify-center bg-gray-50">
    <main class="w-full">
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
{{end}}
