{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{block "title" .}}ClearMoney{{end}}</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX for dynamic updates without full page reloads -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Custom styles beyond Tailwind -->
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="h-full flex flex-col" hx-boost="true">

    {{template "header" .}}

    <!-- Main content area: scrollable, with padding for header and bottom nav -->
    <main class="flex-1 overflow-y-auto pt-14 pb-20 px-4">
        {{block "content" .}}{{end}}
    </main>

    {{template "bottom-nav" .}}

</body>
</html>
{{end}}
