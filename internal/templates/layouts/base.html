<!--
  BASE LAYOUT — The Master Template

  This file uses Go's html/template engine. Key concepts:

  define "base" ... end — declares a named template. The handler executes
  it via tpl.ExecuteTemplate(w, "base", data).

  LARAVEL: This is like resources/views/layouts/app.blade.php.
  DJANGO:  This is like templates/base.html with block/extends.

  Go uses a "clone and parse" pattern instead of extends/yield:
    1. At startup, base.html + components are parsed into a template set
    2. For each page, that set is cloned (deep copy)
    3. Page-specific template is parsed into the clone, overriding blocks
  See: https://pkg.go.dev/html/template#Template.Clone
-->
{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<!-- Dark mode: theme.js adds "dark" class to <html> before paint -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!--
      Title block with default value "ClearMoney".
      Blade equivalent: @yield('title', 'ClearMoney')
      Jinja2: {%% block title %%}ClearMoney{%% endblock %%}
      Child pages override this by redefining the "title" template.
      The dot (.) passes the entire data context — like $this in PHP or self in Python.
    -->
    <title>{{block "title" .}}ClearMoney{{end}}</title>

    <!--
      TAILWIND CSS via CDN — utility-first CSS framework.
      darkMode: 'class' means dark styles activate when <html> has class="dark",
      rather than following the OS preference (darkMode: 'media').
      In production, you'd use the Tailwind CLI to purge unused classes and
      generate a small CSS file. The CDN version is for development convenience.
      Docs: https://tailwindcss.com/docs/dark-mode
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>

    <!-- Apply dark mode before first paint to prevent flash -->
    <script src="/static/js/theme.js"></script>

    <!--
      HTMX — HTML-driven dynamic UI, no JavaScript framework needed.
      HTMX extends HTML with attributes like hx-get, hx-post, hx-swap, etc.
      It sends AJAX requests and swaps HTML fragments into the DOM.

      Think of it as: "What if HTML had AJAX built in?"
      Instead of writing fetch() calls and DOM manipulation in JS,
      you add hx-* attributes directly to HTML elements.

      Laravel equivalent: Livewire (server-rendered, reactive updates)
      Django equivalent:  django-htmx or Turbo/Hotwire

      Docs: https://htmx.org/docs/
      Reference: https://htmx.org/reference/
    -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Custom styles beyond Tailwind -->
    <link rel="stylesheet" href="/static/css/app.css">
    <!-- CSS-only chart components (donut, bar, sparkline, trend) -->
    <link rel="stylesheet" href="/static/css/charts.css">

    <!-- PWA manifest and icons -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
</head>
<!--
  TAILWIND LAYOUT PATTERN: flex flex-col on body
    h-full       = height: 100%  (fills the viewport, set on both <html> and <body>)
    flex flex-col = display: flex; flex-direction: column
    This creates a vertical stack: header (fixed), main (flex-1 = grows), bottom-nav (fixed)

  DARK MODE CLASSES: dark:bg-slate-900 dark:text-slate-200
    When <html> has class="dark", these override the light defaults.
    Tailwind's dark: prefix is like a media query but driven by a CSS class.

  HTMX: hx-boost="true"
    Converts ALL <a> links and <form> submissions inside this element into
    AJAX requests. Instead of a full page reload, HTMX fetches the new page
    and swaps just the <body> content. This gives SPA-like navigation
    without writing any JavaScript. The URL bar still updates (pushState).
    Docs: https://htmx.org/attributes/hx-boost/
-->
<body class="h-full flex flex-col dark:bg-slate-900 dark:text-slate-200" hx-boost="true">

    <!--
      Include the "header" component (defined in components/header.html).
      Blade: @include('components.header')  |  Jinja2: include "header.html"
      The dot passes data context so the header can access .ActiveTab etc.
    -->
    {{template "header" .}}

    <!-- Notification banner (populated by push.js) -->
    <div id="notification-banner" class="fixed top-14 left-0 right-0 z-40 px-4"></div>

    <!--
      MAIN CONTENT AREA — The "yield" / "block" slot.
      Blade: @yield('content')  |  Jinja2: block content / endblock
      Child pages override by defining a "content" template.

      Tailwind classes:
        flex-1          = grows to fill remaining vertical space
        overflow-y-auto = scrollable if content overflows
        pt-14/pb-20     = padding to clear fixed header (56px) and bottom nav (64px)
    -->
    <main class="flex-1 overflow-y-auto pt-14 pb-20 px-4">
        {{block "content" .}}{{end}}
    </main>

    {{template "bottom-nav" .}}

    <!-- Offline transaction queue -->
    <script src="/static/js/offline.js"></script>

    <!-- Push notifications -->
    <script src="/static/js/push.js"></script>

    <!-- TASK-080: Pull-to-refresh and swipe gestures -->
    <script src="/static/js/gestures.js"></script>

    <!--
      SERVICE WORKER REGISTRATION — enables PWA features:
      - Offline caching (app works without internet)
      - Push notifications
      - "Add to Home Screen" on mobile
      The sw.js file intercepts network requests and serves cached responses.
      This is a standard Web API, not specific to Go or HTMX.
      Docs: https://developer.mozilla.org/en-US/docs/Web/API/Service_Worker_API
    -->
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/js/sw.js')
        .catch(function(err) { console.warn('SW registration failed:', err); });
    }
    </script>
</body>
</html>
{{end}}
