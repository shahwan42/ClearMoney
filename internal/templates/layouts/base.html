{{define "base"}}
<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>{{block "title" .}}ClearMoney{{end}}</title>

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- HTMX for dynamic updates without full page reloads -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>

    <!-- Custom styles beyond Tailwind -->
    <link rel="stylesheet" href="/static/css/app.css">

    <!-- PWA manifest and icons -->
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/icons/icon-192.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
</head>
<body class="h-full flex flex-col" hx-boost="true">

    {{template "header" .}}

    <!-- Notification banner (populated by push.js) -->
    <div id="notification-banner" class="fixed top-14 left-0 right-0 z-40 px-4"></div>

    <!-- Main content area: scrollable, with padding for header and bottom nav -->
    <main class="flex-1 overflow-y-auto pt-14 pb-20 px-4">
        {{block "content" .}}{{end}}
    </main>

    {{template "bottom-nav" .}}

    <!-- Offline transaction queue -->
    <script src="/static/js/offline.js"></script>

    <!-- Push notifications -->
    <script src="/static/js/push.js"></script>

    <!-- Register service worker for PWA caching -->
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/js/sw.js')
        .catch(function(err) { console.warn('SW registration failed:', err); });
    }
    </script>
</body>
</html>
{{end}}
