<!--
=============================================================================
  TRANSACTIONS PAGE -- Filtered List with HTMX Live Search
=============================================================================

  HTMX LIVE FILTERING -- The most powerful HTMX pattern on this page:

    <form hx-get="/transactions/list"
          hx-target="#transaction-list"
          hx-trigger="change, keyup changed delay:300ms from:#search-input">

    hx-get="/transactions/list"
      When triggered, sends a GET request with all form field values as query params.
      The server returns an HTML fragment (just the transaction list, not the full page).
      Docs: https://htmx.org/attributes/hx-get/

    hx-target="#transaction-list"
      The response HTML replaces the content of the #transaction-list div.
      This is "partial page update" -- only the list refreshes, not the whole page.
      Docs: https://htmx.org/attributes/hx-target/

    hx-trigger="change, keyup changed delay:300ms from:#search-input"
      Triggers on ANY form element "change" event (dropdown selection, date pick),
      AND on keyup in the search input -- but debounced by 300ms to avoid
      firing on every keystroke. "changed" means only if the value actually changed.
      "from:#search-input" scopes the keyup trigger to just the search field.
      Docs: https://htmx.org/attributes/hx-trigger/

    Blade/Livewire equivalent: Livewire's wire:model.debounce.300ms
    Django equivalent: django-htmx with a view returning a partial template

  hx-boost="true" (on the "+ New" link)
    Converts a normal <a> link into an AJAX request. The page content is
    swapped without a full reload, giving SPA-like navigation.
    Docs: https://htmx.org/attributes/hx-boost/

  hx-preload="mouseover"
    Starts fetching the target page when the user hovers, before they click.
    This is a performance optimization -- by the time they click, the
    response is likely already cached.
    Requires the HTMX preload extension. Similar to Turbo's prefetch.

  Docs: https://htmx.org/docs/
=============================================================================
-->
{{define "title"}}ClearMoney - Transactions{{end}}

{{define "content"}}
<div class="space-y-4 py-4">
    <div class="flex items-center justify-between">
        <h1 class="text-lg font-bold text-slate-800">Transactions</h1>
        <a href="/transactions/new"
           class="bg-teal-600 text-white text-sm px-4 py-2 min-h-[44px] rounded-xl font-medium hover:bg-teal-700 flex items-center"
           hx-boost="true" hx-preload="mouseover">
            + New
        </a>
    </div>

    <!-- Filter bar -->
    <form id="tx-filters" hx-get="/transactions/list" hx-target="#transaction-list" hx-trigger="change, keyup changed delay:300ms from:#search-input"
          class="bg-white rounded-xl shadow-sm p-3 space-y-2">
        <!-- Search -->
        <input id="search-input" type="text" name="search" placeholder="Search notes..."
               class="w-full text-sm border border-gray-200 rounded-lg px-3 py-1.5">

        <div class="grid grid-cols-2 gap-2">
            <select name="account_id" class="text-sm border border-gray-200 rounded-lg px-2 py-1.5">
                <option value="">All Accounts</option>
                {{range .Data.Accounts}}
                <option value="{{.ID}}">{{.Name}}</option>
                {{end}}
            </select>

            <select name="type" class="text-sm border border-gray-200 rounded-lg px-2 py-1.5">
                <option value="">All Types</option>
                <option value="expense">Expense</option>
                <option value="income">Income</option>
            </select>
        </div>

        <div class="grid grid-cols-2 gap-2">
            <input type="date" name="date_from" placeholder="From"
                   class="text-sm border border-gray-200 rounded-lg px-2 py-1.5">
            <input type="date" name="date_to" placeholder="To"
                   class="text-sm border border-gray-200 rounded-lg px-2 py-1.5">
        </div>

        <select name="category_id" class="w-full text-sm border border-gray-200 rounded-lg px-2 py-1.5">
            <option value="">All Categories</option>
            {{range .Data.Categories}}
            <option value="{{.ID}}">{{.Name}}</option>
            {{end}}
        </select>
    </form>

    <!--
      HTMX SWAPPABLE CONTAINER:
      The #transaction-list div is the "swap target" for both the filter form
      above (hx-target="#transaction-list") and the "Load more" button inside
      the transaction-list partial. When HTMX receives an HTML response, it
      replaces the innerHTML of this div with the new content.

      `template "transaction-list" .Data` renders the initial list on page load.
      After that, HTMX handles all updates via AJAX without full page reloads.

      This is a key HTMX pattern: server-rendered initial state + AJAX updates.
      The server always returns the same HTML partial, whether it's the initial
      render or an HTMX request. No separate "API" endpoint needed.
    -->
    <div id="transaction-list">
        {{template "transaction-list" .Data}}
    </div>
</div>
{{end}}
