<!--
=============================================================================
  LOGIN PAGE -- Auth Flow with the "bare" Layout
=============================================================================

  This page uses the "bare" layout (no header, no bottom nav, no HTMX).
  The handler renders it with: tpl.ExecuteTemplate(w, "bare", data)

  WHY NO HTMX HERE?
    The login form uses a traditional <form method="POST" action="/login">.
    On success, the server sends an HTTP redirect (302) with Set-Cookie header.
    Full-page redirects are simpler for auth flows because:
    - Cookies are set on the redirect response
    - The browser handles the redirect automatically
    - No JavaScript state management needed

    If we used hx-post, we'd need to handle the redirect manually with
    HX-Redirect response header. The traditional approach is simpler here.

  DATA CONTEXT FOR AUTH PAGES:
    .Data here is a simple string (the error message), not a complex struct.
    The handler does: render(w, tpl, PageData{Data: "Invalid PIN"})

    `if .Data` checks if there's an error message to show.
    `.Data` outputs the raw string value.

    Go:     `.Data`  (outputs the string directly)
    Blade:  ` $data `  or  ` session('error') `
    Jinja2: ` data `  or  ` get_flashed_messages() `

  TRADITIONAL FORM (no HTMX):
    <form method="POST" action="/login">
    This is standard HTML -- the browser handles the POST and follows the
    redirect. Compare to the transaction form which uses hx-post for AJAX.

  TAILWIND INPUT STYLING:
    tracking-[0.5em] = letter-spacing: 0.5em (spaces out PIN digits)
    inputmode="numeric" = shows numeric keyboard on mobile (HTML5 attribute)
    These work together to create a PIN-entry UX without a PIN input library.

  Docs: https://developer.mozilla.org/en-US/docs/Web/HTML/Attributes/inputmode
=============================================================================
-->
{{define "title"}}ClearMoney - Login{{end}}

{{define "content"}}
<div class="max-w-sm mx-auto py-20 px-4">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800">ClearMoney</h1>
        <p class="text-sm text-gray-500 mt-1">Enter your PIN to continue</p>
    </div>

    {{if .Data}}
    <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm text-center mb-4">
        {{.Data}}
    </div>
    {{end}}

    <form method="POST" action="/login" class="bg-white rounded-2xl shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-xs text-gray-500 mb-2 text-center">PIN</label>
            <input type="password" name="pin" required autofocus
                inputmode="numeric" pattern="[0-9]*" maxlength="6" minlength="4"
                placeholder="----"
                class="w-full text-3xl font-bold text-center tracking-[0.5em] border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <button type="submit"
            class="w-full bg-teal-600 text-white py-3 rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all">
            Unlock
        </button>
    </form>
</div>
{{end}}
