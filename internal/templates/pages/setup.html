{{define "title"}}ClearMoney - Setup{{end}}

{{define "content"}}
<div class="max-w-sm mx-auto py-20 px-4">
    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-slate-800">Welcome to ClearMoney</h1>
        <p class="text-sm text-gray-500 mt-1">Set a 4-6 digit PIN to protect your data</p>
    </div>

    {{if .Data}}
    <div class="bg-red-50 text-red-700 p-3 rounded-lg text-sm text-center mb-4">
        {{.Data}}
    </div>
    {{end}}

    <form method="POST" action="/setup" class="bg-white rounded-2xl shadow-sm p-6 space-y-4">
        <div>
            <label class="block text-xs text-gray-500 mb-1">Choose a PIN</label>
            <input type="password" name="pin" required autofocus
                inputmode="numeric" pattern="[0-9]*" maxlength="6" minlength="4"
                placeholder="----"
                class="w-full text-3xl font-bold text-center tracking-[0.5em] border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <div>
            <label class="block text-xs text-gray-500 mb-1">Confirm PIN</label>
            <input type="password" name="confirm_pin" required
                inputmode="numeric" pattern="[0-9]*" maxlength="6" minlength="4"
                placeholder="----"
                class="w-full text-3xl font-bold text-center tracking-[0.5em] border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <button type="submit"
            class="w-full bg-teal-600 text-white py-3 rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all">
            Set PIN & Start
        </button>
    </form>
</div>
{{end}}
