<!--
=============================================================================
  NEW TRANSACTION FORM -- HTMX Form Submission
=============================================================================

  HTMX FORM SUBMISSION PATTERN:

    <form hx-post="/transactions"
          hx-target="#transaction-result"
          hx-swap="innerHTML">

    hx-post="/transactions"
      Submits the form via AJAX POST (instead of a traditional form submit).
      The form data is sent as application/x-www-form-urlencoded, just like
      a normal HTML form. The Go handler reads it with r.FormValue("amount").
      Docs: https://htmx.org/attributes/hx-post/

    hx-target="#transaction-result"
      The server's HTML response is inserted into the #transaction-result div.
      For success: server returns a green "saved!" banner.
      For errors: server returns a red error message.
      Docs: https://htmx.org/attributes/hx-target/

    hx-swap="innerHTML"
      Replaces the INNER content of the target element (not the element itself).
      Other options: outerHTML, beforeend, afterbegin, delete, none.
      Docs: https://htmx.org/attributes/hx-swap/

    Blade/Livewire: Similar to Livewire's wire:submit.prevent="save"
    Django: Similar to django-htmx returning a partial on form POST

  GO TEMPLATE VARIABLE ASSIGNMENT:
    `$prefillAcct := ""``if .Data.Prefill``$prefillAcct = .Data.Prefill.AccountID``end`

    This declares a local template variable ($prefillAcct) and conditionally
    assigns it. Variables in Go templates start with $ (like PHP).
    Go:     `$var := "value"`  (declare) / `$var = "new"` (reassign)
    Blade:  @php($var = 'value')
    Jinja2: {% set var = 'value' %}

  CUSTOM TEMPLATE FUNCTIONS:
    `string .Data.Prefill.Type` -- converts a Go enum/type to string
    `deref .Data.Prefill.Note`  -- dereferences a *string pointer (nil-safe)
    These handle Go-specific types that don't exist in PHP/Python.

  TAILWIND PEER PATTERN (for radio toggle styling):
    <input class="peer hidden">  -- hides the actual radio button
    <div class="peer-checked:bg-red-50 peer-checked:border-red-400">
    Tailwind's "peer" modifier styles a sibling based on the input's state.
    When the hidden radio is :checked, the visible div changes colors.
    This is pure CSS -- no JavaScript needed for the toggle effect.

  Docs: https://htmx.org/docs/#ajax
        https://tailwindcss.com/docs/hover-focus-and-other-states#peer
=============================================================================
-->
{{define "title"}}ClearMoney - New Transaction{{end}}

{{define "content"}}
<div class="max-w-lg mx-auto py-4">

    <h2 class="text-lg font-bold text-slate-800 mb-4">New Transaction</h2>

    <!-- Response area: HTMX swaps success/error messages here -->
    <div id="transaction-result"></div>

    <form
        hx-post="/transactions"
        hx-target="#transaction-result"
        hx-swap="innerHTML"
        class="bg-white rounded-2xl shadow-sm p-5 space-y-4"
    >
        <!-- Type selector: expense or income -->
        <div class="flex gap-2">
            <label class="flex-1">
                <input type="radio" name="type" value="expense" {{if .Data.Prefill}}{{if eq (string .Data.Prefill.Type) "expense"}}checked{{end}}{{else}}checked{{end}} class="peer hidden">
                <div class="peer-checked:bg-red-50 peer-checked:border-red-400 peer-checked:text-red-700 border-2 border-gray-200 rounded-xl py-3 text-center text-sm font-medium cursor-pointer transition-all"
                     id="type-expense-label">
                    Expense
                </div>
            </label>
            <label class="flex-1">
                <input type="radio" name="type" value="income" {{if .Data.Prefill}}{{if eq (string .Data.Prefill.Type) "income"}}checked{{end}}{{end}} class="peer hidden">
                <div class="peer-checked:bg-teal-50 peer-checked:border-teal-400 peer-checked:text-teal-700 border-2 border-gray-200 rounded-xl py-3 text-center text-sm font-medium cursor-pointer transition-all"
                     id="type-income-label">
                    Income
                </div>
            </label>
        </div>

        <!-- Amount: large, prominent input — the most important field -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Amount</label>
            <input type="number" name="amount" step="0.01" min="0.01" required autofocus
                placeholder="0.00"
                {{if .Data.Prefill}}value="{{.Data.Prefill.Amount}}"{{end}}
                class="w-full text-3xl font-bold text-center border border-gray-300 rounded-xl px-4 py-4 focus:outline-none focus:ring-2 focus:ring-teal-500"
                inputmode="decimal">
        </div>

        <!-- Account selector -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Account</label>
            <select name="account_id" required
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
                <option value="">Select account...</option>
                {{$prefillAcct := ""}}{{if .Data.Prefill}}{{$prefillAcct = .Data.Prefill.AccountID}}{{end}}
                {{range .Data.Accounts}}
                <option value="{{.ID}}" {{if eq .ID $prefillAcct}}selected{{end}}>{{.Name}} ({{.Currency}})</option>
                {{end}}
            </select>
        </div>

        <!-- Currency (hidden, set from selected account) -->
        <input type="hidden" name="currency" value="{{if .Data.Prefill}}{{.Data.Prefill.Currency}}{{else}}EGP{{end}}" id="currency-input">

        <!-- Category selector — shows expense categories by default, switches on type change -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Category</label>
            {{$prefillCat := ""}}{{if .Data.Prefill}}{{if .Data.Prefill.CategoryID}}{{$prefillCat = deref .Data.Prefill.CategoryID}}{{end}}{{end}}
            <select name="category_id"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500"
                id="category-select">
                <option value="">None</option>
                <optgroup label="Expense" class="category-expense">
                {{range .Data.ExpenseCategories}}
                <option value="{{.ID}}" {{if eq .ID $prefillCat}}selected{{end}}>{{if .Icon}}{{deref .Icon}} {{end}}{{.Name}}</option>
                {{end}}
                </optgroup>
                <optgroup label="Income" class="category-income" style="display:none">
                {{range .Data.IncomeCategories}}
                <option value="{{.ID}}" {{if eq .ID $prefillCat}}selected{{end}}>{{if .Icon}}{{deref .Icon}} {{end}}{{.Name}}</option>
                {{end}}
                </optgroup>
            </select>
        </div>

        <!-- Date: defaults to today (even for duplicates) -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Date</label>
            <input type="date" name="date"
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <!-- Optional note -->
        <div>
            <label class="block text-xs text-gray-500 mb-1">Note (optional)</label>
            <input type="text" name="note" placeholder="What was this for?"
                {{if .Data.Prefill}}{{if .Data.Prefill.Note}}value="{{deref .Data.Prefill.Note}}"{{end}}{{end}}
                class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        </div>

        <!-- Submit button -->
        <button type="submit"
            class="w-full bg-teal-600 text-white py-3 rounded-xl text-base font-semibold hover:bg-teal-700 active:scale-[0.98] transition-all">
            Save Transaction
        </button>
    </form>

</div>

<!-- Set today's date as default and handle type/category switching -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Default date to today (always, even for duplicates)
    const dateInput = document.querySelector('input[name="date"]');
    if (dateInput && !dateInput.value) {
        dateInput.value = new Date().toISOString().split('T')[0];
    }

    // Switch categories when type changes
    document.querySelectorAll('input[name="type"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            const isExpense = this.value === 'expense';
            document.querySelector('optgroup.category-expense').style.display = isExpense ? '' : 'none';
            document.querySelector('optgroup.category-income').style.display = isExpense ? 'none' : '';
            document.getElementById('category-select').value = '';
        });
    });

    // Show correct categories on load for income duplicates
    var checkedType = document.querySelector('input[name="type"]:checked');
    if (checkedType && checkedType.value === 'income') {
        document.querySelector('optgroup.category-expense').style.display = 'none';
        document.querySelector('optgroup.category-income').style.display = '';
    }

    // Update currency when account changes
    document.querySelector('select[name="account_id"]').addEventListener('change', function() {
        const selected = this.options[this.selectedIndex];
        if (selected && selected.text.includes('USD')) {
            document.getElementById('currency-input').value = 'USD';
        } else {
            document.getElementById('currency-input').value = 'EGP';
        }
    });
});
</script>
{{end}}
