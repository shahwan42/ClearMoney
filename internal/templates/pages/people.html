{{define "title"}}ClearMoney - People{{end}}

{{define "content"}}
<div class="max-w-lg mx-auto space-y-4 py-4">

    <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold text-slate-800">People</h2>
    </div>

    <!-- Add person form -->
    <form hx-post="/people/add" hx-target="#people-list" hx-swap="innerHTML"
          class="bg-white rounded-xl shadow-sm p-4 flex gap-2">
        <input type="text" name="name" placeholder="Person name..." required
               class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500">
        <button type="submit"
                class="bg-teal-600 text-white text-sm px-4 py-2 rounded-lg font-medium hover:bg-teal-700">
            Add
        </button>
    </form>

    <!-- People list -->
    <div id="people-list" class="space-y-3">
        {{if .Data.Persons}}
            {{range .Data.Persons}}
                {{template "person-card" .}}
            {{end}}
        {{else}}
            <div class="bg-white rounded-xl shadow-sm p-6 text-center">
                <p class="text-gray-400 text-sm">No people yet. Add someone above.</p>
            </div>
        {{end}}
    </div>

</div>
{{end}}
