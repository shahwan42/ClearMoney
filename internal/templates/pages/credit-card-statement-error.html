{{define "title"}}Statement - {{.Data.Account.Name}}{{end}}

{{define "content"}}
<div class="max-w-lg mx-auto space-y-6 py-4">
    <a href="/accounts/{{.Data.Account.ID}}" class="inline-flex items-center text-sm text-teal-600 hover:text-teal-700">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to {{.Data.Account.Name}}
    </a>

    <section class="bg-white rounded-2xl shadow-sm p-6 text-center">
        <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <h2 class="text-lg font-bold text-slate-800 mb-2">No Billing Cycle Configured</h2>
        <p class="text-sm text-gray-500">{{.Data.Message}}</p>
    </section>
</div>
{{end}}
