<!--
=============================================================================
  ACCOUNTS PAGE -- Institution-grouped account listing
=============================================================================

  TEMPLATE COMPOSITION PATTERN:
    This page demonstrates how to compose a view from multiple sub-templates:
      `template "institution-form" .`  -- the "add institution" form
      `template "institution-card" .`  -- repeated for each institution

    Each sub-template is defined in its own file under partials/.
    They're all parsed into the same template set at startup, so they can
    reference each other freely.

    Blade:  @include('partials.institution-form')  /  @include('partials.institution-card', $inst)
    Jinja2: {% include "partials/institution-form.html" %}  /  {% include "partials/institution-card.html" %}

  HTMX TARGET PATTERN:
    <div id="account-form-area"></div> is an empty container. When the user
    clicks "+ Account" on an institution card, HTMX fetches the account form
    and swaps it into this div. This is the "empty target" pattern:
    1. Start with an empty div with an ID
    2. An hx-get button targets that div
    3. Server returns HTML fragment, HTMX swaps it in
    No JavaScript DOM manipulation needed!

    Blade/Livewire equivalent: A Livewire component that toggles form visibility
    Django equivalent: An HTMX view returning a form partial

  RANGE WITH SUB-TEMPLATES:
    `range .Data`
        `template "institution-card" .`
    `end`

    Inside the range, dot (.) is the current InstitutionGroup struct.
    That struct is passed directly to the institution-card template.
    Each card renders independently with its own institution + accounts data.

  Docs: https://htmx.org/attributes/hx-target/
        https://htmx.org/attributes/hx-swap/
=============================================================================
-->
{{define "title"}}ClearMoney - Accounts{{end}}

{{define "content"}}
<div class="max-w-lg mx-auto space-y-4 py-4">

    <div class="flex items-center justify-between">
        <h2 class="text-lg font-bold text-slate-800">Accounts</h2>
    </div>

    <!-- Institution form (always visible at top) -->
    <div id="institution-form-area">
        {{template "institution-form" .}}
    </div>

    <!-- Institution list with their accounts -->
    <div id="institution-list" class="space-y-3">
        {{if .Data}}
            {{range .Data}}
                {{template "institution-card" .}}
            {{end}}
        {{else}}
            <div class="bg-white rounded-xl shadow-sm p-6 text-center">
                <p class="text-gray-400 text-sm">No institutions yet. Add one above to get started.</p>
            </div>
        {{end}}
    </div>

</div>

<!-- Delete institution bottom sheet overlay -->
<div id="delete-sheet-overlay" class="fixed inset-0 z-[80] bg-black/40 hidden" onclick="closeDeleteSheet()"></div>

<!-- Delete institution bottom sheet -->
<div id="delete-sheet" class="fixed bottom-0 left-0 right-0 z-[90] bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl translate-y-full transition-transform duration-300 ease-out max-h-[70vh] overflow-y-auto">
    <!-- Drag handle -->
    <div class="flex justify-center pt-3 pb-1" id="delete-sheet-handle">
        <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
    </div>
    <div id="delete-sheet-content" class="px-4 pb-6">
        <!-- Content loaded via HTMX when sheet opens -->
    </div>
</div>

<!-- Add account bottom sheet overlay -->
<div id="account-sheet-overlay" class="fixed inset-0 z-[80] bg-black/40 hidden" onclick="closeAccountSheet()"></div>

<!-- Add account bottom sheet -->
<div id="account-sheet" class="fixed bottom-0 left-0 right-0 z-[90] bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl translate-y-full transition-transform duration-300 ease-out max-h-[70vh] overflow-y-auto">
    <!-- Drag handle -->
    <div class="flex justify-center pt-3 pb-1" id="account-sheet-handle">
        <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
    </div>
    <div id="account-sheet-content" class="px-4 pb-6">
        <!-- Content loaded via HTMX when sheet opens -->
    </div>
</div>

<!-- Edit institution bottom sheet overlay -->
<div id="edit-sheet-overlay" class="fixed inset-0 z-[80] bg-black/40 hidden" onclick="closeEditSheet()"></div>

<!-- Edit institution bottom sheet -->
<div id="edit-sheet" class="fixed bottom-0 left-0 right-0 z-[90] bg-white dark:bg-slate-900 rounded-t-2xl shadow-2xl translate-y-full transition-transform duration-300 ease-out max-h-[50vh] overflow-y-auto">
    <!-- Drag handle -->
    <div class="flex justify-center pt-3 pb-1" id="edit-sheet-handle">
        <div class="w-10 h-1 bg-gray-300 rounded-full"></div>
    </div>
    <div id="edit-sheet-content" class="px-4 pb-6">
        <!-- Content loaded via HTMX when sheet opens -->
    </div>
</div>

<script>
function openAccountSheet(institutionId) {
    var overlay = document.getElementById('account-sheet-overlay');
    var sheet = document.getElementById('account-sheet');
    overlay.classList.remove('hidden');
    sheet.offsetHeight;
    sheet.classList.remove('translate-y-full');
    sheet.classList.add('translate-y-0');
    document.body.style.overflow = 'hidden';
    htmx.ajax('GET', '/accounts/form?institution_id=' + institutionId, {
        target: '#account-sheet-content',
        swap: 'innerHTML'
    });
}

function closeAccountSheet() {
    var overlay = document.getElementById('account-sheet-overlay');
    var sheet = document.getElementById('account-sheet');
    sheet.classList.remove('translate-y-0');
    sheet.classList.add('translate-y-full');
    overlay.classList.add('hidden');
    document.body.style.overflow = '';
    setTimeout(function() {
        document.getElementById('account-sheet-content').innerHTML = '';
    }, 300);
}

(function() {
    var handle = document.getElementById('account-sheet-handle');
    var sheet = document.getElementById('account-sheet');
    if (!handle || !sheet) return;
    var startY = 0, currentY = 0, isDragging = false;
    handle.addEventListener('touchstart', function(e) {
        startY = e.touches[0].clientY;
        isDragging = true;
        sheet.style.transition = 'none';
    });
    handle.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        currentY = e.touches[0].clientY;
        var diff = currentY - startY;
        if (diff > 0) sheet.style.transform = 'translateY(' + diff + 'px)';
    });
    handle.addEventListener('touchend', function() {
        if (!isDragging) return;
        isDragging = false;
        sheet.style.transition = '';
        sheet.style.transform = '';
        if (currentY - startY > 100) {
            closeAccountSheet();
        } else {
            sheet.classList.add('translate-y-0');
        }
        startY = 0; currentY = 0;
    });
})();
</script>
