# Production Docker Compose for ClearMoney.
# Deploys Caddy (HTTPS) + Django + background jobs + PostgreSQL.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - django
    restart: unless-stopped

  django:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      - DJANGO_ALLOWED_HOSTS=clearmoney.shahwan.me
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate &&
        gunicorn clearmoney.wsgi:application --bind 0.0.0.0:8000 --workers 2 --access-logfile -
      "

  # Background jobs — runs startup jobs then periodic tasks hourly.
  django-cron:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
      django:
        condition: service_started
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py run_startup_jobs &&
        while true; do
          sleep 3600;
          python manage.py generate_notifications;
          python manage.py cleanup_notifications;
          python manage.py refresh_views;
          python manage.py take_snapshots;
          python manage.py cleanup_sessions;
        done
      "

  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-clearmoney}"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
