# Production Docker Compose for ClearMoney.
# Deploys Caddy (HTTPS) + App + PostgreSQL.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - django
    restart: unless-stopped

  app:
    build: .
    expose:
      - "8080"
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Django application — serves all routes via Caddy reverse proxy.
  django:
    build:
      context: .
      dockerfile: backend/Dockerfile
    expose:
      - "8000"
    env_file: .env.prod
    environment:
      - DJANGO_ALLOWED_HOSTS=clearmoney.shahwan.me
      - DATABASE_URL=postgres://clearmoney:clearmoney@db:5432/clearmoney?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    env_file: .env.prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-clearmoney}"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
